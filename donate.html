  <style>
    body {
      opacity: 0;
      transition: opacity 0.6s ease;
    }

    html, body {
      margin: 0;
      padding: 0;

    body {

      background: var(--bg-main-night);
      color: var(--text-night);
    }

:root {
  /* 日间主题（主页同款） */
  --bg-main-day: #3EEDE7;
  --card-bg-day: rgba(255,255,255,0.55);
  --text-day: #1f2f33;     /* 主文字，明显更深 */
  --accent-day: #2fbec4;  /* 去荧光的蓝绿强调色 */

  /* 夜间主题（donate 当前） */
  --bg-main-night: #161823;
  --card-bg-night: rgba(22, 24, 35, 0.9);
  --text-night: #E8FFFF;
  --accent-night: #3EEDE7;
}

    body.day {
      background: var(--bg-main-day);
      color: var(--text-day);
    }

    .container {
      position: relative;
      max-width: 800px;
      margin: 120px auto;
      padding: 40px 34px;
      background-color: var(--card-bg-night);
      border-radius: 18px;
      box-shadow:
        0 30px 80px rgba(0,0,0,0.45),
        0 0 40px rgba(62, 237, 231, 0.18);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      animation: fadeInUp 0.8s ease-out;
      transition: box-shadow .35s ease, transform .35s ease;
    }

    .container:hover {
      transform: translateY(-4px);
      box-shadow:
        0 40px 100px rgba(0,0,0,0.55),
        0 0 60px rgba(62, 237, 231, 0.28);
    }
    body.day .container {
      background-color: rgba(225, 242, 247, 0.92);
      box-shadow: 0 18px 40px rgba(0,0,0,0.16);
    }

    body.day p,
    body.day span,
    body.day .thanks-item .msg,
    body.day .thanks-item .time,
    body.day #tierHintText {
      color: var(--text-day);
    }

body.day .thanks-item {
  background: rgba(225, 240, 244, 0.95);
  border-color: rgba(47,190,196,0.45);
}
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }

    h1 {
      text-align: center;
      color: var(--primary);
      margin-bottom: 20px;
    }

    .tier-group {
      display: flex;
      justify-content: center;
      gap: 14px;
      flex-wrap: wrap;
      margin: 18px 0 10px;
    }

    .tier-btn {
      background: rgba(62,237,231,0.06);
      border: 1px solid rgba(62,237,231,0.25);
      color: var(--primary);
      padding: 10px 22px;
      border-radius: 999px;
      cursor: pointer;
      transition: all .25s ease;
      font-size: 14px;
      opacity: 0.7;
    }

    .tier-btn.active {
      background: linear-gradient(135deg, var(--primary), #9ffcff);
      border-color: var(--primary);
      color: #000;
      opacity: 1;
      box-shadow: 0 8px 24px rgba(62,237,231,0.45);
      transform: translateY(-2px);
    }

    #thanksToast {
      position: fixed;
      left: 50%;
      bottom: 14%;
      transform: translateX(-50%) scale(.9);
      background: rgba(0,0,0,0.7);
      color: var(--primary);
      padding: 14px 26px;
      border-radius: 30px;
      opacity: 0;
      pointer-events: none;
      transition: .35s ease;
      box-shadow: 0 10px 40px rgba(62,237,231,0.4);
      z-index: 9999;
    }

    #thanksToast.show {
      opacity: 1;
      transform: translateX(-50%) scale(1);
    }

    .qrcode-section {
      display: flex;
      justify-content: center;
      gap: 40px;
      margin: 24px 0 40px;
      flex-wrap: wrap;
    }

    .amount-center {
      text-align: center;
      margin: 0;
    }

    .amount-center span {
      display: inline-block;
      font-size: 22px;
      font-weight: 700;
      color: var(--primary);
      padding: 8px 24px;
      border-radius: 999px;
      border: 1px solid rgba(62,237,231,0.45);
      background: rgba(62,237,231,0.08);
      letter-spacing: 1px;
    }

    .qrcode {
      background: rgba(5, 49, 84, 0.55);
      border-radius: 16px;
      padding: 18px 16px 22px;
      text-align: center;
      box-shadow: 0 8px 30px rgba(62,237,231,0.15);
      transition: transform .25s ease, box-shadow .25s ease;
      cursor: pointer;
      position: relative;
      overflow: hidden;
    }

    .qrcode:hover {
      transform: translateY(-6px) scale(1.02);
      box-shadow: 0 12px 40px rgba(62,237,231,0.35);
    }

    .qrcode::after {
      content: "";
      position: absolute;
      inset: 0;
      background: radial-gradient(circle at 30% 20%, rgba(62,237,231,0.25), transparent 60%);
      opacity: 0;
      transition: .3s;
      pointer-events: none;
    }

    .qrcode:hover::after {
      opacity: 1;
    }

    .qrcode img {
      width: 180px;
      height: auto;
      border-radius: 12px;
      margin-bottom: 10px;
      transition: transform .25s ease;
    }

    .qrcode.flash {
      animation: qrFlash 0.35s ease;
    }

    @keyframes qrFlash {
      0%   { transform: scale(1); box-shadow: 0 0 0 rgba(62,237,231,0); }
      50%  { transform: scale(1.06); box-shadow: 0 0 20px rgba(62,237,231,0.6); }
      100% { transform: scale(1); box-shadow: 0 0 0 rgba(62,237,231,0); }
    }

    .amount-flash {
      animation: amountFlash 0.4s ease;
    }

    @keyframes amountFlash {
      from { opacity: 0.3; transform: translateY(4px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .qrcode:hover img {
      transform: scale(1.05);
    }

    .qrcode p {
      margin: 8px 0 0;
      font-size: 15px;
      color: var(--primary);
      letter-spacing: 1px;
    }

    .btn-group {
      display: flex;
      justify-content: center;
      gap: 20px;
      margin-top: 30px;
    }

    button {
      background-color: var(--primary);
      border: none;
      padding: 12px 24px;
      border-radius: 8px;
      font-size: 16px;
      cursor: pointer;
      color: black;
      transition: 0.3s;
    }

    button:hover {
      background-color: #5ae0e6;
    }

    .footer {
      text-align: center;
      margin-top: 40px;
      color: #ccc;
      font-size: 14px;
    }
body.day .footer {
  color: #3f5f66;
}
    @media (max-width: 600px) {
      .qrcode-section {
        grid-template-columns: 1fr;
        gap: 24px;
      }
      .amount-center {
        order: -1;
        margin-bottom: 8px;
      }
    }
    .thanks-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-top: 10px;
      max-width: 520px;
      margin-left: auto;
      margin-right: auto;
    }

    .thanks-item {
      background: rgba(5, 49, 84, 0.55);
      border: 1px solid rgba(62,237,231,0.25);
      border-radius: 14px;
      padding: 12px 14px;
      box-shadow: 0 6px 18px rgba(62,237,231,0.15);
      animation: fadeInUp .4s ease both;
    }
    .thanks-item.mine {
  border-color: var(--primary);
  box-shadow:
    0 0 0 2px rgba(62,237,231,0.35),
    0 10px 30px rgba(62,237,231,0.35);
  background: rgba(62,237,231,0.12);
  position: relative;
}

.thanks-item.mine::before {
  content: "你的留言";
  position: absolute;
  top: -10px;
  right: 10px;
  background: var(--primary);
  color: #000;
  font-size: 11px;
  padding: 2px 8px;
  border-radius: 999px;
  box-shadow: 0 4px 10px rgba(62,237,231,0.4);
}
    .thanks-item .name {
      color: var(--primary);
      font-size: 14px;
      margin-bottom: 4px;
    }

    .thanks-item .msg {
      color: #ddd;
      font-size: 13px;
      line-height: 1.4;
      opacity: .9;
    }

    .thanks-item .time {
      margin-top: 6px;
      font-size: 12px;
      color: #9fdde0;
      opacity: .8;
      text-align: right;
    }

    .thanks-item .like-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 6px;
      gap: 8px;
    }

    .like-btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-weight: 500;
      background: rgba(62,237,231,0.15);
      border: 1px solid rgba(62,237,231,0.6);
      color: var(--primary);
      border-radius: 999px;
      padding: 2px 10px;
      font-size: 12px;
      cursor: pointer;
      transition: .2s ease;
    }

    .like-btn .heart {
      position: relative;
      width: 10px;
      height: 10px;
      transform: rotate(-45deg);
      display: inline-block;
      background: var(--primary);
      border-radius: 2px;
    }

    .like-btn .heart::before,
    .like-btn .heart::after {
      content: "";
      position: absolute;
      width: 10px;
      height: 10px;
      background: var(--primary);
      border-radius: 50%;
    }

    .like-btn .heart::before {
      top: -5px;
      left: 0;
    }

    .like-btn .heart::after {
      left: 5px;
      top: 0;
    }

    .like-btn.liked {
      background: var(--primary);
      color: #000;
    }

    .like-btn.liked .heart {
      filter: drop-shadow(0 0 6px rgba(62,237,231,0.8));
      animation: heartPop 0.3s ease;
    }

    .like-btn:not(.liked) .heart {
      opacity: 0.35;
    }

    @keyframes heartPop {
      0% { transform: scale(1); }
      50% { transform: scale(1.25); }
      100% { transform: scale(1); }
    }

    .thanks-form {
      margin-top: 26px;
      display: flex;
      flex-direction: column;
      gap: 14px;
      background: rgba(5, 49, 84, 0.55);
      border: 1px solid rgba(62,237,231,0.35);
      border-radius: 18px;
      padding: 18px 16px 20px;
      box-shadow: 0 10px 35px rgba(62,237,231,0.18);
    }
    body.day .thanks-form {
  background: rgba(215, 235, 240, 0.95);
  border-color: rgba(47,190,196,0.45);
  box-shadow: 0 14px 32px rgba(0,0,0,0.18);
}

body.day .thanks-form input,
body.day .thanks-form textarea {
  background: rgba(255,255,255,0.85);
  color: #1f2f33;
  border-color: rgba(47,190,196,0.45);
}

body.day .thanks-form input::placeholder,
body.day .thanks-form textarea::placeholder {
  color: #6b8a91;
}

    .thanks-title {
      margin: 0;
      text-align: center;
      font-size: 15px;
      color: var(--primary);
      letter-spacing: 1px;
    }

    .thanks-fields {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .thanks-form input,
    .thanks-form textarea {
      background: rgba(0,0,0,0.45);
      border: 1px solid rgba(62,237,231,0.45);
      border-radius: 12px;
      padding: 10px 12px;
      color: #fff;
      outline: none;
      font-size: 14px;
      resize: none;
      transition: border .2s ease, box-shadow .2s ease, background .2s ease;
    }

    .thanks-form input:focus,
    .thanks-form textarea:focus {
      border-color: var(--primary);
      background: rgba(0,0,0,0.55);
      box-shadow: 0 0 0 2px rgba(62,237,231,0.25);
    }

    .thanks-form input::placeholder,
    .thanks-form textarea::placeholder {
      color: #aaa;
    }

    .thanks-form button {
      align-self: center;
      padding: 10px 28px;
      border-radius: 999px;
      background: linear-gradient(135deg, var(--primary), #9ffcff);
      border: none;
      cursor: pointer;
      transition: transform .2s ease, box-shadow .2s ease, filter .2s ease;
      box-shadow: 0 6px 18px rgba(62,237,231,0.45);
      font-weight: bold;
      letter-spacing: 1px;
    }

    .thanks-form button:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 26px rgba(62,237,231,0.6);
      filter: brightness(1.05);
    }

    .thanks-form button:disabled {
      opacity: .6;
      cursor: not-allowed;
      transform: none;
      box-shadow: none;
    }

    #thanksTip {
      text-align: center;
      font-size: 12px;
      color: #aaa;
    }

    /* 骨架屏加载效果 */
    .thanks-item.skeleton {
      height: 58px;
      background: linear-gradient(100deg,
        rgba(5, 49, 84, 0.18) 40%,
        rgba(5, 49, 84, 0.33) 50%,
        rgba(5, 49, 84, 0.18) 60%);
      background-size: 200% 100%;
      animation: skeleton 1.2s ease infinite;
    }

    @keyframes skeleton {
      to { background-position: -200% 0; }
    }
    /* 二维码放大预览 */
    .img-preview {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.65);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      animation: fadeIn .3s ease;
    }

    .img-preview.active {
      display: flex;
    }

    .img-preview img {
      max-width: 80vw;
      max-height: 80vh;
      border-radius: 16px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.5);
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    /* 加载动画样式 */
    #loading {
      position: fixed;
      inset: 0;
      z-index: 9999;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: opacity 0.6s ease;
      background: radial-gradient(
        circle at center,
        rgba(113,248,252,0.18),
        #f2feff 65%
      );
    }

    body:not(.day) #loading {
      background: radial-gradient(
        circle at center,
        rgba(62,237,231,0.14),
        rgba(22,24,35,0.96) 65%
      );
    }
    /* 主题强调色变量适配 */
    body {
      --primary: var(--accent-night);
    }

    body.day {
      --primary: var(--accent-day);
    }

    .loader {
      border: 6px solid rgba(255,255,255,0.12);
      border-top: 6px solid var(--primary);
      border-radius: 50%;
      width: 56px;
      height: 56px;
      animation: spin 1s linear infinite;
      box-shadow: 0 0 20px rgba(62,237,231,0.35);
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    body.fade-in {
      animation: fadeBody 0.8s ease;
    }

    @keyframes fadeBody {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    body.fade-out {
      animation: fadeOut 0.6s ease forwards;
    }

    @keyframes fadeOut {
      to { opacity: 0; }
    }
  
#loadingBar {
  opacity: 0;
  pointer-events: none;
  display: none;
}
#loadingBar.active {
  opacity: 1;
  pointer-events: auto;
  display: flex;
}
#loadingBar img {   transform: scale(0.9);   transition: transform .25s ease; }  #loadingBar.active img {   transform: scale(1); } body:not(.night) #loadingBar { background: rgba(255,255,255,0.65); backdrop-filter: blur(12px); } body:not(.night) #loadingBar div { color: #334155; } body:not(.night) #loadingBar img { filter: drop-shadow(0 4px 12px rgba(0,0,0,0.15)); }
</style>

        greeting: (name) => `ようこそ、${name || "友達"} 💙`
      }
    };

    function applyLangDonate(nameForGreeting) {
      const lang = localStorage.getItem("lang") || "zh";
      const t = i18n[lang] || i18n.zh;

      document.title = t.pageTitle;
      document.getElementById("titleText").textContent = t.title;
      document.getElementById("supportDesc").textContent = t.supportDesc;

      document.getElementById("tierCoffee").textContent = t.tierCoffee;
      document.getElementById("tierMeal").textContent = t.tierMeal;
      document.getElementById("tierBiglove").textContent = t.tierBiglove;
      document.getElementById("tierHintText").textContent = t.tierHint;

      document.getElementById("wxPayText").textContent = t.wxPay;
      document.getElementById("aliPayText").textContent = t.aliPay;

      document.getElementById("thanksBoardTitle").textContent = t.boardTitle;
      document.getElementById("thanksBoardDesc").textContent = t.boardDesc;

      document.getElementById("loadMoreText").textContent = t.loadMore;
      document.getElementById("thanksFormTitle").textContent = t.formTitle;

      document.getElementById("submitThanksText").textContent = t.submit;
      document.getElementById("backBtn").textContent = t.back;
      document.getElementById("logoutBtn").textContent = t.logout;

      const msgInput = document.getElementById("thanksMsg");
      if (msgInput) msgInput.placeholder = t.msgPh + " · " + t.tip;

      const greet = document.getElementById("userGreeting");
      if (greet) greet.textContent = t.greeting(nameForGreeting);
    }
    window.applyLangDonate = applyLangDonate;

window.addEventListener('load', () => {
  // ✅ Reveal page ONLY after loading finishes
  requestAnimationFrame(() => {
    document.body.style.opacity = '1';

  document.body.classList.add('fade-in');
  const loader = document.getElementById('loading');

    // 所有 a[href] 和按钮跳转添加淡出动画
    document.addEventListener("DOMContentLoaded", () => {
      // 链接跳转处理

          document.body.classList.add("fade-out");

  </script>
  <script type="module">
    import { supabase } from '/p/js/supabaseClient.js';
    import { clearSupabaseAuthStorage } from '/p/js/authState.js';
      // ===== donate 页面登录守门 =====
  const {
    data: { session: initialSession }
  } = await supabase.auth.getSession();

  if (!initialSession) {
    // 未登录，强制回主页
    location.replace('/');
    throw new Error('Not logged in');
  }

    // 时间格式化辅助
    function formatTime(iso) {
      if (!iso) return "";

      const t = new Date(iso);
      const now = new Date();
      const diff = (now - t) / 1000;

      if (diff < 60) return "刚刚";
      if (diff < 3600) return Math.floor(diff / 60) + " 分钟前";
      if (diff < 86400) return Math.floor(diff / 3600) + " 小时前";

      const isToday = now.toDateString() === t.toDateString();
      if (isToday) {
        return "今天 " + pad(t.getHours()) + ":" + pad(t.getMinutes());
      }

      return (
        (t.getMonth() + 1) + "月" +
        t.getDate() + "日 " +
        pad(t.getHours()) + ":" +
        pad(t.getMinutes())
      );
    }

    function pad(n) {
      return n < 10 ? "0" + n : n;
    }

    // 加载粉丝鸣谢榜
    const thanksList = document.getElementById("thanksList");
    let thanksPage = 0;
    const PAGE_SIZE = 8;

    let currentUserEmail = null;
    let currentUserId = null;
    async function loadThanks(reset = false) {
      if (reset) {
        thanksPage = 0;
        if (thanksList) {
          thanksList.innerHTML = `
            <div class="thanks-item skeleton"></div>
            <div class="thanks-item skeleton"></div>
            <div class="thanks-item skeleton"></div>
          `;
        }
      }

      const from = thanksPage * PAGE_SIZE;
      const to = from + PAGE_SIZE - 1;

      const { data, error } = await supabase
        .from("thanks")
        .select("id, name, message, created_at")
        .order("created_at", { ascending: false })
        .range(from, to);

      if (error || !data) {
        if (thanksList && reset) {
          thanksList.innerHTML = '<div class="thanks-item"><div class="msg">暂无鸣谢记录，期待你的第一份支持 💙</div></div>';
        }
        return;
      }

      if (thanksList) {
        if (reset) thanksList.innerHTML = "";

        const html = data.map(item => {
          const isMine = currentUserEmail && item.name === currentUserEmail;
          return `
          <div class="thanks-item ${isMine ? "mine" : ""}" data-id="${item.id}">
            <div class="name">${item.name || ""}</div>
            <div class="msg">${item.message || "感谢支持！"}</div>
            <div class="like-row">
              <div class="time">${formatTime(item.created_at)}</div>
              <button class="like-btn">
                <span class="heart"></span>
                <span class="like-count">0</span>
              </button>
            </div>
          </div>
          `;
        }).join("");

        thanksList.insertAdjacentHTML("beforeend", html);
      }

      const loadMoreBtn = document.getElementById("loadMoreBtn");
      if (loadMoreBtn) {
        if (data.length < PAGE_SIZE) {
          loadMoreBtn.style.display = "none";
        } else {
          loadMoreBtn.style.display = "inline-block";
        }
      }

      thanksPage++;
    }

    // 显示用户昵称/邮箱，并保存当前用户邮箱
    let currentSession = initialSession;

    function syncUserFromSession() {
      const user = currentSession?.user || null;
      currentUserEmail = user?.email || null;
      currentUserId = user?.id || null;

      const greet = document.getElementById("userGreeting");
      if (greet) {
        const name = user?.user_metadata?.name || user?.email || null;
        window.applyLangDonate && window.applyLangDonate(name);
      }

      return user;
    }

    syncUserFromSession();

    loadThanks(true);

    const loadMoreBtn = document.getElementById("loadMoreBtn");
    if (loadMoreBtn) {
      loadMoreBtn.addEventListener("click", () => {
        loadThanks(false);
      });
    }

    // 点赞 / 取消点赞（一人一票）
    thanksList.addEventListener("click", async (e) => {
      const btn = e.target.closest(".like-btn");
      if (!btn) return;

      if (!currentSession) {
        alert("请先登录再点赞 💙");
        return;
      }

      const item = btn.closest(".thanks-item");
      const thanksId = item.dataset.id;

      btn.disabled = true;

      const isLiked = btn.classList.contains("liked");
      // Find the like-count span for updating
      const countSpan = btn.querySelector(".like-count");
      let count = parseInt(countSpan ? countSpan.textContent : "0", 10);

      if (!isLiked) {
        // 点赞
        const { error } = await supabase.from("thanks_likes").insert({
          thanks_id: thanksId,
          user_id: currentUserId
        });

        if (!error) {
          count = count + 1;
          if (countSpan) countSpan.textContent = count;
          btn.classList.add("liked");
        }
      } else {
        // 取消点赞
        const { error } = await supabase
          .from("thanks_likes")
          .delete()
          .eq("thanks_id", thanksId)
          .eq("user_id", currentUserId);

        if (!error) {
          count = Math.max(0, count - 1);
          if (countSpan) countSpan.textContent = count;
          btn.classList.remove("liked");
        }
      }

      btn.disabled = false;
    });

    let isSigningOut = false;

    function redirectAfterSignOut() {
      if (isSigningOut) return;
      isSigningOut = true;
      sessionStorage.removeItem('justLoggedIn');
      sessionStorage.setItem("forceLoggedOut", "1");
      // 退出后也视为站内跳转
      sessionStorage.setItem("skipSplash", "1");
      document.body.classList.add("fade-out");
      setTimeout(() => window.location.href = "/", 600);
    }

    supabase.auth.onAuthStateChange((event, nextSession) => {
      currentSession = nextSession;
      syncUserFromSession();

      if (event === 'SIGNED_OUT' || !nextSession) {
        clearSupabaseAuthStorage(localStorage);
        redirectAfterSignOut();
      }
    });

    // 退出登录（彻底清除 Supabase session）
    const logoutBtn = document.getElementById("logoutBtn");
    if (logoutBtn) {
      logoutBtn.addEventListener("click", async (e) => {
        e.preventDefault();
        e.stopPropagation();

        const { error } = await supabase.auth.signOut({ scope: 'global' });
        if (error) {
          console.warn("Sign out failed:", error);
          return;
        }

        clearSupabaseAuthStorage(localStorage);
        redirectAfterSignOut();
      });
    }
    // 提交鸣谢留言
    const submitBtn = document.getElementById("submitThanks");
    const msgInput = document.getElementById("thanksMsg");
    const tip = document.getElementById("thanksTip");

    if (submitBtn) {
      submitBtn.addEventListener("click", async () => {
        const user = currentSession?.user || null;
        if (!user) {
          tip.textContent = "请先登录后再提交";
          submitBtn.disabled = true;
          submitBtn.textContent = "请先登录";
          msgInput.disabled = true;
          return;
        }

        const name = user.user_metadata?.name || user.email;
        if (!name) {
          tip.textContent = "未获取到用户身份，请重新登录";
          return;
        }

        const message = msgInput.value.trim();
        if (!message) {
          tip.textContent = "请输入留言内容";
          return;
        }

        submitBtn.disabled = true;
        submitBtn.textContent = "提交中...";

        const { error } = await supabase.from("thanks").insert({
          name,
          message
        });

        if (error) {
          console.error(error);
          tip.textContent = "提交失败，请稍后再试";
          submitBtn.disabled = false;
          submitBtn.textContent = "提交到鸣谢榜";
          return;
        }

        msgInput.value = "";
        tip.textContent = "已提交，感谢你的支持！💙";

        await loadThanks(true);

        submitBtn.disabled = false;
        submitBtn.textContent = "提交到鸣谢榜";
      });
    }

    // 档位选择效果
    const tierBtns = document.querySelectorAll(".tier-btn");
    const hint = document.getElementById("tierHintText");
    let selectedTier = null;

    const wxQr = document.getElementById("wxQr");
    const zfbQr = document.getElementById("zfbQr");
    const amountText = document.getElementById("amountText");

    function updateQrByTier(tier) {
      let wxSrc = "";
      let zfbSrc = "";
      let amount = "";

      if (tier === "coffee") {
        wxSrc = "p/ten_wx.jpeg";
        zfbSrc = "p/ten_zfb.jpeg";
        amount = "当前金额：¥10";
      }

      if (tier === "meal") {
        wxSrc = "p/twenty_wx.jpeg";
        zfbSrc = "p/twenty_zfb.jpeg";
        amount = "当前金额：¥20";
      }

      if (tier === "biglove") {
        wxSrc = "p/fifty_wx.jpeg";
        zfbSrc = "p/fifty_zfb.jpeg";
        amount = "当前金额：¥50";
      }

      if (!wxSrc || !zfbSrc) return;

      wxQr.src = wxSrc;
      zfbQr.src = zfbSrc;
      amountText.textContent = amount;

      // 视觉反馈
      document.querySelectorAll(".qrcode").forEach(box => {
        box.classList.remove("flash");
        void box.offsetWidth;
        box.classList.add("flash");
      });

      amountText.classList.remove("amount-flash");
      void amountText.offsetWidth;
      amountText.classList.add("amount-flash");
    }

    tierBtns.forEach(btn => {
      btn.addEventListener("click", () => {
        tierBtns.forEach(b => b.classList.remove("active"));
        btn.classList.add("active");
        selectedTier = btn.dataset.tier;
        updateQrByTier(selectedTier);

        if (selectedTier === "coffee") hint.textContent = "☕ 已选择：咖啡档位，感谢你的温柔支持～";
        if (selectedTier === "meal") hint.textContent = "🍔 已选择：吃饭档位，今天加个鸡腿！";
        if (selectedTier === "biglove") hint.textContent = "💖 已选择：狠狠爱我档位，真的太感动了！";
      });
    });

    // 默认选中咖啡档
    const defaultBtn = document.querySelector('.tier-btn[data-tier="coffee"]');
    if (defaultBtn) {
      defaultBtn.classList.add("active");
      selectedTier = "coffee";
      updateQrByTier("coffee");
      hint.textContent = "☕ 已选择：咖啡档位，感谢你的温柔支持～";
    }

    // 扫码点击感谢动画 + 二维码放大预览
    const toast = document.getElementById("thanksToast");
    document.querySelectorAll(".qrcode img").forEach(img => {
      img.addEventListener("click", (e) => {
        e.stopPropagation(); // 不影响档位逻辑
        // 先放大预览
        previewImg.src = img.src;
        preview.classList.add("active");
        // toast 动画
        toast.classList.add("show");
        setTimeout(() => toast.classList.remove("show"), 1800);
      });
    });
  
function showGlobalLoading() {
  const el = document.getElementById("loadingBar");
  if (!el) return;
  el.style.display = "flex";
  requestAnimationFrame(() => el.classList.add("active"));
}

function hideGlobalLoading() {
  const el = document.getElementById("loadingBar");
  if (!el) return;
  el.classList.remove("active");
  setTimeout(() => {
    el.style.display = "none";
  }, 250);
}

// 页面进入立即关闭 loading（防止跨页面残留）
document.addEventListener("DOMContentLoaded", () => {
  hideGlobalLoading();
});

document.querySelectorAll("a").forEach(a => {
  a.addEventListener("click", () => {
    showGlobalLoading();
  });
});
</script>
