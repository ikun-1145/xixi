<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title id="pageTitle">捐赠支持 - 霜蓝</title>
  <meta name="theme-color" content="#f7f9fa" media="(prefers-color-scheme: light)">
  <meta name="theme-color" content="#13151e" media="(prefers-color-scheme: dark)">
  <link rel="stylesheet" href="p/css/tokens.css">
  <link rel="stylesheet" href="p/css/base.css">
  <style>
    body {
      opacity: 0;
      transition: opacity var(--dur-slow) ease;
    }

    html, body {
      margin: 0;
      padding: 0;
      min-height: 100vh;
    }

    /* ---------- 主容器 ---------- */
    .container {
      position: relative;
      width: min(100% - var(--space-8), 800px);
      margin: var(--space-16) auto;
      padding: var(--space-12) var(--space-8);
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--r-xl);
      box-shadow: var(--shadow-md);
      animation: fade-in-up var(--dur-slow) var(--ease) both;
    }

    h1 {
      text-align: center;
      font-size: var(--title-md);
      font-weight: 700;
      letter-spacing: -0.01em;
      margin-bottom: var(--space-4);
    }

    #userGreeting {
      text-align: center;
      margin: 0 0 var(--space-2);
      font-size: var(--text-sm);
      color: var(--brand-strong);
    }

    #supportDesc {
      text-align: center;
      margin: 0 0 var(--space-4);
      color: var(--text-2);
    }

    #logoutBtn {
      position: absolute;
      top: var(--space-4);
      right: var(--space-4);
      z-index: 10;
      height: 32px;
      padding: 0 var(--space-4);
      background: transparent;
      border: 1px solid var(--border-strong);
      border-radius: var(--r-full);
      font-family: inherit;
      font-size: var(--text-xs);
      font-weight: 500;
      color: var(--text-2);
      cursor: pointer;
      transition: color var(--dur-fast) var(--ease),
                  border-color var(--dur-fast) var(--ease);
    }

    #logoutBtn:hover {
      color: var(--text);
      border-color: var(--brand);
    }

    /* ---------- 档位选择 ---------- */
    .tier-group {
      display: flex;
      justify-content: center;
      gap: var(--space-3);
      flex-wrap: wrap;
      margin: var(--space-4) 0 var(--space-2);
    }

    .tier-btn {
      height: 40px;
      padding: 0 var(--space-6);
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: var(--r-full);
      font-family: inherit;
      font-size: var(--text-sm);
      font-weight: 500;
      color: var(--text-2);
      cursor: pointer;
      transition: border-color var(--dur-fast) var(--ease),
                  color var(--dur-fast) var(--ease),
                  background var(--dur-fast) var(--ease),
                  box-shadow var(--dur-fast) var(--ease);
    }

    .tier-btn:hover {
      border-color: var(--brand);
      color: var(--text);
    }

    .tier-btn.active {
      background: var(--brand);
      border-color: var(--brand);
      color: var(--on-brand);
      font-weight: 600;
      box-shadow: var(--shadow-sm);
    }

    #tierHintText {
      text-align: center;
      margin: var(--space-3) 0 0;
      color: var(--text-3);
      font-size: var(--text-sm);
    }

    /* ---------- 金额展示 ---------- */
    .amount-center {
      text-align: center;
      margin: var(--space-8) 0 0;
    }

    .amount-center span {
      display: inline-block;
      font-size: var(--text-lg);
      font-weight: 700;
      color: var(--brand-strong);
      padding: var(--space-2) var(--space-6);
      border-radius: var(--r-full);
      border: 1px solid var(--border);
      background: var(--brand-soft);
      letter-spacing: 0.02em;
      font-variant-numeric: tabular-nums;
    }

    .amount-flash {
      animation: amount-flash var(--dur-slow) ease;
    }

    @keyframes amount-flash {
      from { opacity: 0.3; transform: translateY(4px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ---------- 收款码 ---------- */
    .qrcode-section {
      display: flex;
      justify-content: center;
      gap: var(--space-8);
      margin: var(--space-6) 0 var(--space-12);
      flex-wrap: wrap;
    }

    .qrcode {
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: var(--r-lg);
      padding: var(--space-4) var(--space-4) var(--space-6);
      text-align: center;
      box-shadow: var(--shadow-sm);
      transition: transform var(--dur-fast) var(--ease),
                  border-color var(--dur-fast) var(--ease),
                  box-shadow var(--dur-fast) var(--ease);
      cursor: pointer;
    }

    .qrcode:hover {
      transform: translateY(-2px);
      border-color: var(--brand);
      box-shadow: var(--shadow-md);
    }

    .qrcode img {
      width: 180px;
      height: auto;
      border-radius: var(--r-md);
      margin-bottom: var(--space-2);
      display: block;
    }

    .qrcode.flash {
      animation: qr-flash var(--dur-base) ease;
    }

    @keyframes qr-flash {
      0%   { transform: scale(1); }
      50%  { transform: scale(1.02); }
      100% { transform: scale(1); }
    }

    .qrcode p {
      margin: var(--space-2) 0 0;
      font-size: var(--text-sm);
      font-weight: 600;
      color: var(--text-2);
      letter-spacing: 0.02em;
    }

    /* ---------- 鸣谢榜 ---------- */
    .board-title {
      text-align: center;
      font-size: var(--title-sm);
      font-weight: 700;
      color: var(--text);
      margin: var(--space-16) 0 var(--space-2);
    }

    .board-desc {
      text-align: center;
      color: var(--text-3);
      font-size: var(--text-sm);
      margin: 0 0 var(--space-4);
    }

    .thanks-list {
      display: flex;
      flex-direction: column;
      gap: var(--space-3);
      margin-top: var(--space-2);
      max-width: 520px;
      margin-left: auto;
      margin-right: auto;
    }

    .thanks-item {
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: var(--r-md);
      padding: var(--space-3) var(--space-4);
      animation: fade-in-up var(--dur-slow) var(--ease) both;
    }

    .thanks-item.mine {
      border-color: var(--brand);
      background: var(--brand-soft);
      position: relative;
    }

    .thanks-item.mine::before {
      content: "你的留言";
      position: absolute;
      top: -10px;
      right: 10px;
      background: var(--brand);
      color: var(--on-brand);
      font-size: 11px;
      font-weight: 600;
      padding: 2px 8px;
      border-radius: var(--r-full);
    }

    .thanks-item .name {
      color: var(--brand-strong);
      font-size: var(--text-sm);
      font-weight: 600;
      margin-bottom: var(--space-1);
    }

    .thanks-item .msg {
      color: var(--text-2);
      font-size: var(--text-sm);
      line-height: 1.5;
    }

    .thanks-item .time {
      font-size: var(--text-xs);
      color: var(--text-3);
      text-align: right;
    }

    .thanks-item .like-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: var(--space-2);
      gap: var(--space-2);
    }

    .like-btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-weight: 500;
      background: var(--surface);
      border: 1px solid var(--border-strong);
      color: var(--text-2);
      border-radius: var(--r-full);
      padding: 2px 10px;
      font-size: var(--text-xs);
      cursor: pointer;
      transition: border-color var(--dur-fast) var(--ease),
                  color var(--dur-fast) var(--ease),
                  background var(--dur-fast) var(--ease);
    }

    .like-btn:hover { border-color: var(--brand); }

    .like-btn .heart {
      position: relative;
      width: 10px;
      height: 10px;
      transform: rotate(-45deg);
      display: inline-block;
      background: var(--brand);
      border-radius: 2px;
    }

    .like-btn .heart::before,
    .like-btn .heart::after {
      content: "";
      position: absolute;
      width: 10px;
      height: 10px;
      background: var(--brand);
      border-radius: 50%;
    }

    .like-btn .heart::before { top: -5px; left: 0; }
    .like-btn .heart::after  { left: 5px; top: 0; }

    .like-btn.liked {
      background: var(--brand);
      border-color: var(--brand);
      color: var(--on-brand);
    }

    .like-btn.liked .heart,
    .like-btn.liked .heart::before,
    .like-btn.liked .heart::after {
      background: var(--on-brand);
    }

    .like-btn.liked .heart { animation: heart-pop var(--dur-base) ease; }

    .like-btn:not(.liked) .heart { opacity: 0.35; }

    @keyframes heart-pop {
      0% { transform: rotate(-45deg) scale(1); }
      50% { transform: rotate(-45deg) scale(1.25); }
      100% { transform: rotate(-45deg) scale(1); }
    }

    /* ---------- 留言表单 ---------- */
    .thanks-form {
      margin-top: var(--space-8);
      display: flex;
      flex-direction: column;
      gap: var(--space-3);
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: var(--r-lg);
      padding: var(--space-6) var(--space-4);
    }

    .thanks-title {
      margin: 0;
      text-align: center;
      font-size: var(--text-base);
      font-weight: 600;
      color: var(--text);
      letter-spacing: 0.02em;
    }

    .thanks-fields {
      display: flex;
      flex-direction: column;
      gap: var(--space-2);
    }

    .thanks-form input,
    .thanks-form textarea {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--r-md);
      padding: 10px 12px;
      color: var(--text);
      outline: none;
      font-family: inherit;
      font-size: var(--text-sm);
      resize: none;
      transition: border-color var(--dur-fast) var(--ease),
                  box-shadow var(--dur-fast) var(--ease);
    }

    .thanks-form input:focus,
    .thanks-form textarea:focus {
      border-color: var(--brand);
      box-shadow: 0 0 0 3px var(--brand-soft);
    }

    .thanks-form input::placeholder,
    .thanks-form textarea::placeholder {
      color: var(--text-3);
    }

    .thanks-form button {
      align-self: center;
      height: 40px;
      padding: 0 var(--space-8);
      border-radius: var(--r-md);
      background: var(--brand);
      color: var(--on-brand);
      border: none;
      font-family: inherit;
      font-size: var(--text-sm);
      font-weight: 600;
      cursor: pointer;
      transition: background var(--dur-fast) var(--ease),
                  transform var(--dur-fast) var(--ease),
                  box-shadow var(--dur-fast) var(--ease);
    }

    .thanks-form button:hover {
      background: var(--brand-strong);
      transform: translateY(-1px);
      box-shadow: var(--shadow-sm);
    }

    .thanks-form button:disabled {
      opacity: .6;
      cursor: not-allowed;
      transform: none;
      box-shadow: none;
    }

    #thanksTip {
      text-align: center;
      font-size: var(--text-xs);
      color: var(--text-3);
    }

    /* ---------- 加载更多 ---------- */
    #loadMoreWrap {
      text-align: center;
      margin-top: var(--space-4);
    }

    #loadMoreBtn {
      height: 36px;
      padding: 0 var(--space-6);
      background: var(--surface);
      border: 1px solid var(--border-strong);
      color: var(--text-2);
      border-radius: var(--r-full);
      font-family: inherit;
      font-size: var(--text-sm);
      font-weight: 500;
      cursor: pointer;
      transition: border-color var(--dur-fast) var(--ease),
                  color var(--dur-fast) var(--ease);
    }

    #loadMoreBtn:hover {
      border-color: var(--brand);
      color: var(--text);
    }

    /* ---------- 返回按钮 ---------- */
    .btn-group {
      display: flex;
      justify-content: center;
      gap: var(--space-4);
      margin-top: var(--space-8);
    }

    #backBtn {
      height: 44px;
      padding: 0 var(--space-8);
      background: var(--surface);
      color: var(--text);
      border: 1px solid var(--border-strong);
      border-radius: var(--r-md);
      font-family: inherit;
      font-size: var(--text-base);
      font-weight: 600;
      cursor: pointer;
      transition: border-color var(--dur-fast) var(--ease),
                  transform var(--dur-fast) var(--ease),
                  box-shadow var(--dur-fast) var(--ease);
    }

    #backBtn:hover {
      border-color: var(--brand);
      transform: translateY(-1px);
      box-shadow: var(--shadow-sm);
    }

    /* ---------- Toast ---------- */
    #thanksToast {
      position: fixed;
      left: 50%;
      bottom: 14%;
      transform: translateX(-50%) scale(.96);
      background: var(--text);
      color: var(--bg);
      padding: 12px 24px;
      border-radius: var(--r-full);
      font-size: var(--text-sm);
      font-weight: 500;
      opacity: 0;
      pointer-events: none;
      transition: opacity var(--dur-base) var(--ease),
                  transform var(--dur-base) var(--ease);
      box-shadow: var(--shadow-lg);
      z-index: 9999;
    }

    #thanksToast.show {
      opacity: 1;
      transform: translateX(-50%) scale(1);
    }

    /* ---------- 骨架屏 ---------- */
    .thanks-item.skeleton {
      height: 58px;
      background: linear-gradient(100deg,
        var(--surface-2) 40%,
        var(--border) 50%,
        var(--surface-2) 60%);
      background-size: 200% 100%;
      animation: skeleton 1.2s ease infinite;
    }

    @keyframes skeleton {
      to { background-position: -200% 0; }
    }

    /* ---------- 二维码放大预览 ---------- */
    .img-preview {
      position: fixed;
      inset: 0;
      background: var(--scrim);
      -webkit-backdrop-filter: blur(8px);
      backdrop-filter: blur(8px);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      animation: fade-in var(--dur-base) ease;
    }

    .img-preview.active { display: flex; }

    .img-preview img {
      max-width: 80vw;
      max-height: 80vh;
      border-radius: var(--r-lg);
      box-shadow: var(--shadow-lg);
    }

    @keyframes fade-in {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    /* ---------- 页面加载指示 ---------- */
    #loading {
      position: fixed;
      inset: 0;
      z-index: 9998;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--bg);
      transition: opacity var(--dur-slow) ease;
    }

    body.fade-in { animation: fade-body var(--dur-slow) ease; }

    @keyframes fade-body {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    @media (max-width: 600px) {
      .container { padding: var(--space-8) var(--space-4); margin: var(--space-8) auto; }
      .qrcode-section { gap: var(--space-4); }
      .amount-center { margin-top: var(--space-6); }
    }
  </style>
</head>
<body>
  <script>
    /* 首帧前应用夜间主题，避免闪色 */
    (function () {
      var hour = new Date().getHours();
      if (hour >= 18 || hour < 6) document.body.classList.add('night');
    })();
  </script>

  <!-- 加载动画 -->

    <div class="spinner" aria-hidden="true"></div>
  </div>

  <!-- 二维码放大预览层 -->
  <div id="imgPreview" class="img-preview">

  <div id="thanksToast">感谢你的支持！💙</div>

  <div class="container">

    <p id="userGreeting"></p>
    <button id="logoutBtn"> </button>
    <p id="supportDesc"></p>

    <div class="tier-group">
      <button class="tier-btn" data-tier="coffee">☕ <span id="tierCoffee"></span></button>
      <button class="tier-btn" data-tier="meal">🍔 <span id="tierMeal"></span></button>

      <div class="qrcode">

    <h2 class="board-title"><span id="thanksBoardTitle"></span></h2>

        <span id="loadMoreText"></span>

      <div class="thanks-fields">

      <button id="submitThanks"><span id="submitThanksText"></span></button>
      <div id="thanksTip"></div>

    <div class="btn-group">
      <button id="backBtn"></button>
    </div>

    <footer class="site-footer">© 2024–2026 霜蓝 · All Rights Reserved.</footer>
  </div>

  <!-- 跳转与加载逻辑 -->

    (function applyDonateAutoTheme() {

    /* --------- i18n --------- */
    const i18n = {

        aliPay: "Alipay",

        loadMore: "Load more",
        formTitle: "✍ Leave your message",

        back: "Back to Home",

        greeting: (name) => `Welcome, ${name || "friend"} 💙`
      },
      ja: {
        pageTitle: "支援 - フロスト",

        tierCoffee: "コーヒーをごちそう",

        tierHint: "金額を選んでQRコードで支払ってください。",

        loadMore: "もっと見る",

        namePh: "ニックネーム（任意）",
        msgPh: "フロストへのメッセージ（任意）",
        submit: "送信",
        tip: "送信後、一覧に表示されます 💙",
        back: "ホームへ戻る",
        logout: "ログアウト",
        greeting: (name) => `ようこそ、${name || "友達"} 💙`
      }

    function applyLangDonate(nameForGreeting) {
      const lang = localStorage.getItem("lang") || "zh";
      const t = i18n[lang] || i18n.zh;

      document.title = t.pageTitle;
      document.getElementById("titleText").textContent = t.title;
      document.getElementById("supportDesc").textContent = t.supportDesc;

      document.getElementById("tierCoffee").textContent = t.tierCoffee;
      document.getElementById("tierMeal").textContent = t.tierMeal;
      document.getElementById("tierBiglove").textContent = t.tierBiglove;
      document.getElementById("tierHintText").textContent = t.tierHint;

      document.getElementById("wxPayText").textContent = t.wxPay;
      document.getElementById("aliPayText").textContent = t.aliPay;

      document.getElementById("thanksBoardTitle").textContent = t.boardTitle;
      document.getElementById("thanksBoardDesc").textContent = t.boardDesc;

      document.getElementById("loadMoreText").textContent = t.loadMore;
      document.getElementById("thanksFormTitle").textContent = t.formTitle;

      document.getElementById("submitThanksText").textContent = t.submit;
      document.getElementById("backBtn").textContent = t.back;
      document.getElementById("logoutBtn").textContent = t.logout;

      const msgInput = document.getElementById("thanksMsg");
      if (msgInput) msgInput.placeholder = t.msgPh + " · " + t.tip;

      const greet = document.getElementById("userGreeting");
      if (greet) greet.textContent = t.greeting(nameForGreeting);
    }
    window.applyLangDonate = applyLangDonate;

window.addEventListener('load', () => {
  // ✅ Reveal page ONLY after loading finishes

    // 所有 a[href] 和按钮跳转添加淡出动画
    document.addEventListener("DOMContentLoaded", () => {
      // 链接跳转处理
      const links = document.querySelectorAll("a[href]");

          document.body.classList.add("fade-out");

  </script>
  <script type="module">
    import { supabase } from '/p/js/supabaseClient.js';
    import { clearSupabaseAuthStorage } from '/p/js/authState.js';
      // ===== donate 页面登录守门 =====
  const {
    data: { session: initialSession }
  } = await supabase.auth.getSession();

  if (!initialSession) {
    // 未登录，强制回主页
    location.replace('/');
    throw new Error('Not logged in');
  }

    // 时间格式化辅助
    function formatTime(iso) {
      if (!iso) return "";

      const t = new Date(iso);
      const now = new Date();
      const diff = (now - t) / 1000;

      if (diff < 60) return "刚刚";
      if (diff < 3600) return Math.floor(diff / 60) + " 分钟前";
      if (diff < 86400) return Math.floor(diff / 3600) + " 小时前";

      const isToday = now.toDateString() === t.toDateString();
      if (isToday) {
        return "今天 " + pad(t.getHours()) + ":" + pad(t.getMinutes());
      }

      return (
        (t.getMonth() + 1) + "月" +
        t.getDate() + "日 " +
        pad(t.getHours()) + ":" +
        pad(t.getMinutes())
      );
    }

    function pad(n) {
      return n < 10 ? "0" + n : n;
    }

    // 加载粉丝鸣谢榜
    const thanksList = document.getElementById("thanksList");
    let thanksPage = 0;
    const PAGE_SIZE = 8;

    let currentUserEmail = null;
    let currentUserId = null;
    async function loadThanks(reset = false) {
      if (reset) {
        thanksPage = 0;
        if (thanksList) {
          thanksList.innerHTML = `
            <div class="thanks-item skeleton"></div>
            <div class="thanks-item skeleton"></div>
            <div class="thanks-item skeleton"></div>
          `;
        }
      }

      const from = thanksPage * PAGE_SIZE;
      const to = from + PAGE_SIZE - 1;

      const { data, error } = await supabase
        .from("thanks")
        .select("id, name, message, created_at")
        .order("created_at", { ascending: false })
        .range(from, to);

      if (error || !data) {
        if (thanksList && reset) {
          thanksList.innerHTML = '<div class="thanks-item"><div class="msg">暂无鸣谢记录，期待你的第一份支持 💙</div></div>';
        }
        return;
      }

      if (thanksList) {
        if (reset) thanksList.innerHTML = "";

        const html = data.map(item => {
          const isMine = currentUserEmail && item.name === currentUserEmail;
          return `
          <div class="thanks-item ${isMine ? "mine" : ""}" data-id="${item.id}">
            <div class="name">${item.name || ""}</div>
            <div class="msg">${item.message || "感谢支持！"}</div>
            <div class="like-row">
              <div class="time">${formatTime(item.created_at)}</div>
              <button class="like-btn">
                <span class="heart"></span>
                <span class="like-count">0</span>
              </button>
            </div>
          </div>
          `;
        }).join("");

        thanksList.insertAdjacentHTML("beforeend", html);
      }

      const loadMoreBtn = document.getElementById("loadMoreBtn");
      if (loadMoreBtn) {
        if (data.length < PAGE_SIZE) {
          loadMoreBtn.style.display = "none";
        } else {
          loadMoreBtn.style.display = "inline-block";
        }
      }

      thanksPage++;
    }

    // 显示用户昵称/邮箱，并保存当前用户邮箱
    let currentSession = initialSession;

    function syncUserFromSession() {
      const user = currentSession?.user || null;
      currentUserEmail = user?.email || null;
      currentUserId = user?.id || null;

      const greet = document.getElementById("userGreeting");
      if (greet) {
        const name = user?.user_metadata?.name || user?.email || null;
        window.applyLangDonate && window.applyLangDonate(name);
      }

      return user;
    }

    syncUserFromSession();

    loadThanks(true);

    const loadMoreBtn = document.getElementById("loadMoreBtn");
    if (loadMoreBtn) {
      loadMoreBtn.addEventListener("click", () => {
        loadThanks(false);
      });
    }

    // 点赞 / 取消点赞（一人一票）
    thanksList.addEventListener("click", async (e) => {
      const btn = e.target.closest(".like-btn");
      if (!btn) return;

      if (!currentSession) {
        alert("请先登录再点赞 💙");
        return;
      }

      const item = btn.closest(".thanks-item");
      const thanksId = item.dataset.id;

      btn.disabled = true;

      const isLiked = btn.classList.contains("liked");
      // Find the like-count span for updating
      const countSpan = btn.querySelector(".like-count");
      let count = parseInt(countSpan ? countSpan.textContent : "0", 10);

      if (!isLiked) {
        // 点赞
        const { error } = await supabase.from("thanks_likes").insert({
          thanks_id: thanksId,
          user_id: currentUserId
        });

        if (!error) {
          count = count + 1;
          if (countSpan) countSpan.textContent = count;
          btn.classList.add("liked");
        }
      } else {
        // 取消点赞
        const { error } = await supabase
          .from("thanks_likes")
          .delete()
          .eq("thanks_id", thanksId)
          .eq("user_id", currentUserId);

        if (!error) {
          count = Math.max(0, count - 1);
          if (countSpan) countSpan.textContent = count;
          btn.classList.remove("liked");
        }
      }

      btn.disabled = false;
    });

    let isSigningOut = false;

    function redirectAfterSignOut() {
      if (isSigningOut) return;
      isSigningOut = true;
      sessionStorage.removeItem('justLoggedIn');
      sessionStorage.setItem("forceLoggedOut", "1");
      // 退出后也视为站内跳转
      sessionStorage.setItem("skipSplash", "1");
      document.body.classList.add("fade-out");
      setTimeout(() => window.location.href = "/", 250);
    }

    supabase.auth.onAuthStateChange((event, nextSession) => {
      currentSession = nextSession;
      syncUserFromSession();

      if (event === 'SIGNED_OUT' || !nextSession) {
        clearSupabaseAuthStorage(localStorage);
        redirectAfterSignOut();
      }
    });

    // 退出登录（彻底清除 Supabase session）
    const logoutBtn = document.getElementById("logoutBtn");
    if (logoutBtn) {
      logoutBtn.addEventListener("click", async (e) => {
        e.preventDefault();
        e.stopPropagation();

        const { error } = await supabase.auth.signOut({ scope: 'global' });
        if (error) {
          console.warn("Sign out failed:", error);
          return;
        }

        clearSupabaseAuthStorage(localStorage);
        redirectAfterSignOut();
      });
    }
    // 提交鸣谢留言
    const submitBtn = document.getElementById("submitThanks");
    const msgInput = document.getElementById("thanksMsg");
    const tip = document.getElementById("thanksTip");

    if (submitBtn) {
      submitBtn.addEventListener("click", async () => {
        const user = currentSession?.user || null;
        if (!user) {
          tip.textContent = "请先登录后再提交";
          submitBtn.disabled = true;
          submitBtn.textContent = "请先登录";
          msgInput.disabled = true;
          return;
        }

        const name = user.user_metadata?.name || user.email;
        if (!name) {
          tip.textContent = "未获取到用户身份，请重新登录";
          return;
        }

        const message = msgInput.value.trim();
        if (!message) {
          tip.textContent = "请输入留言内容";
          return;
        }

        submitBtn.disabled = true;
        submitBtn.textContent = "提交中...";

        const { error } = await supabase.from("thanks").insert({
          name,
          message
        });

        if (error) {
          console.error(error);
          tip.textContent = "提交失败，请稍后再试";
          submitBtn.disabled = false;
          submitBtn.textContent = "提交到鸣谢榜";
          return;
        }

        msgInput.value = "";
        tip.textContent = "已提交，感谢你的支持！💙";

        await loadThanks(true);

        submitBtn.disabled = false;
        submitBtn.textContent = "提交到鸣谢榜";
      });
    }

    // 档位选择效果
    const tierBtns = document.querySelectorAll(".tier-btn");
    const hint = document.getElementById("tierHintText");
    let selectedTier = null;

    const wxQr = document.getElementById("wxQr");
    const zfbQr = document.getElementById("zfbQr");
    const amountText = document.getElementById("amountText");

    function updateQrByTier(tier) {
      let wxSrc = "";
      let zfbSrc = "";
      let amount = "";

      if (tier === "coffee") {
        wxSrc = "p/ten_wx.jpeg";
        zfbSrc = "p/ten_zfb.jpeg";
        amount = "当前金额：¥10";
      }

      if (tier === "meal") {
        wxSrc = "p/twenty_wx.jpeg";
        zfbSrc = "p/twenty_zfb.jpeg";
        amount = "当前金额：¥20";
      }

      if (tier === "biglove") {
        wxSrc = "p/fifty_wx.jpeg";
        zfbSrc = "p/fifty_zfb.jpeg";
        amount = "当前金额：¥50";
      }

      if (!wxSrc || !zfbSrc) return;

      wxQr.src = wxSrc;
      zfbQr.src = zfbSrc;
      amountText.textContent = amount;

      // 视觉反馈
      document.querySelectorAll(".qrcode").forEach(box => {
        box.classList.remove("flash");
        void box.offsetWidth;
        box.classList.add("flash");
      });

      amountText.classList.remove("amount-flash");
      void amountText.offsetWidth;
      amountText.classList.add("amount-flash");
    }

    tierBtns.forEach(btn => {
      btn.addEventListener("click", () => {
        tierBtns.forEach(b => b.classList.remove("active"));
        btn.classList.add("active");
        selectedTier = btn.dataset.tier;
        updateQrByTier(selectedTier);

        if (selectedTier === "coffee") hint.textContent = "☕ 已选择：咖啡档位，感谢你的温柔支持～";
        if (selectedTier === "meal") hint.textContent = "🍔 已选择：吃饭档位，今天加个鸡腿！";
        if (selectedTier === "biglove") hint.textContent = "💖 已选择：狠狠爱我档位，真的太感动了！";
      });
    });

    // 默认选中咖啡档
    const defaultBtn = document.querySelector('.tier-btn[data-tier="coffee"]');
    if (defaultBtn) {
      defaultBtn.classList.add("active");
      selectedTier = "coffee";
      updateQrByTier("coffee");
      hint.textContent = "☕ 已选择：咖啡档位，感谢你的温柔支持～";
    }

    // 扫码点击感谢动画 + 二维码放大预览
    const toast = document.getElementById("thanksToast");
    document.querySelectorAll(".qrcode img").forEach(img => {
      img.addEventListener("click", (e) => {
        e.stopPropagation(); // 不影响档位逻辑
        // 先放大预览
        previewImg.src = img.src;
        preview.classList.add("active");
        // toast 动画
        toast.classList.add("show");
        setTimeout(() => toast.classList.remove("show"), 1800);
      });
    });
  
function showGlobalLoading() {
  const el = document.getElementById("loadingBar");
  if (el) el.classList.add("active");
}

function hideGlobalLoading() {
  const el = document.getElementById("loadingBar");
  if (el) el.classList.remove("active");
}

// 页面进入立即关闭 loading（防止跨页面残留）
document.addEventListener("DOMContentLoaded", () => {
  hideGlobalLoading();
});

document.querySelectorAll("a").forEach(a => {
  a.addEventListener("click", () => {
    showGlobalLoading();
  });
});
</script>
