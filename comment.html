<!DOCTYPE html>
<html lang="zh-Hans">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="x-dns-prefetch-control" content="off">
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title id="pageTitle">评论留言 - 霜蓝</title>
  <meta name="theme-color" content="#f7f9fa" media="(prefers-color-scheme: light)">
  <meta name="theme-color" content="#13151e" media="(prefers-color-scheme: dark)">
  <link rel="stylesheet" href="p/css/tokens.css">
  <link rel="stylesheet" href="p/css/base.css">
  <style>
    /* preload 阶段页面不可见 */
    body.preload { opacity: 0; }

    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      overflow-x: hidden;
    }

    .page-card {
      width: min(100% - var(--space-8), 720px);
      margin-top: var(--space-16);
      padding: var(--space-8) var(--space-6) var(--space-12);
      text-align: center;
      animation: fade-in-up var(--dur-slow) var(--ease) both;
    }

    h1 {
      font-size: var(--title-md);
      font-weight: 700;
      letter-spacing: -0.01em;
      margin-bottom: var(--space-6);
    }

    #giscus {
      text-align: left;
      margin-top: var(--space-4);
    }

    .back { margin-top: var(--space-8); }

    @media (max-width: 480px) {
      .page-card { margin-top: var(--space-12); }
    }

    /* 页面加载指示 */
    #loading {
      position: fixed;
      inset: 0;
      z-index: 9998;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--bg);
      transition: opacity var(--dur-slow) ease;
    }

    body.fade-in { animation: fade-body var(--dur-slow) ease; }
    @keyframes fade-body { from { opacity: 0; } to { opacity: 1; } }
  </style>
</head>
<body>
  <script>
    /* 首帧前应用夜间主题，避免闪色 */
    (function () {
      var hour = new Date().getHours();
      if (hour >= 18 || hour < 6) document.body.classList.add('night');
    })();
  </script>

  <!-- 加载动画 -->
  <div id="loading" aria-label="页面加载中">
    <div class="spinner" aria-hidden="true"></div>
  </div>

  <div id="langSwitcher" class="lang-switcher" role="navigation" aria-label="语言切换">
    <button data-lang="zh">中文</button>
    <button data-lang="en">EN</button>
    <button data-lang="ja">日本語</button>
  </div>

  <main class="page-shell page-card card">
    <h1 id="titleText"></h1>

    <!-- Giscus 评论系统 -->
    <div id="giscus"></div>

    <a href="index.html" class="back btn btn-secondary" id="backBtn"></a>
  </main>

  <footer class="site-footer">© 2024–2026 霜蓝 · All Rights Reserved.</footer>

  <!-- 淡入淡出 + 跳转逻辑 -->
  <script>
    document.body.classList.add('preload');

    function applyAutoTheme() {
      const hour = new Date().getHours();
      const isNight = hour >= 18 || hour < 6;
      document.body.classList.toggle('night', isNight);
    }

    applyAutoTheme();
    setInterval(applyAutoTheme, 10 * 60 * 1000);
    /* --------- i18n --------- */
    const i18n = {
      zh: {
        pageTitle: "评论留言 - 霜蓝",
        title: "评论留言",
        back: "← 返回主页",
        giscusLang: "zh-CN"
      },
      en: {
        pageTitle: "Comments - Sunland",
        title: "Comments",
        back: "← Back to Home",
        giscusLang: "en"
      },
      ja: {
        pageTitle: "コメント - フロスト",
        title: "コメント",
        back: "← ホームへ戻る",
        giscusLang: "ja"
      }
    };

    function loadGiscus(lang) {
      const container = document.getElementById("giscus");
      if (!container) return;
      container.innerHTML = "";

      const script = document.createElement("script");
      script.src = "https://giscus.app/client.js";
      script.setAttribute("data-repo", "ikun-1145/xixi");
      script.setAttribute("data-repo-id", "R_kgDON2L-Ag");
      script.setAttribute("data-category", "Announcements");
      script.setAttribute("data-category-id", "DIC_kwDON2L-As4CsGg4");
      script.setAttribute("data-mapping", "pathname");
      script.setAttribute("data-strict", "0");
      script.setAttribute("data-reactions-enabled", "1");
      script.setAttribute("data-emit-metadata", "0");
      script.setAttribute("data-input-position", "bottom");
      script.setAttribute("data-theme", "preferred_color_scheme");
      script.setAttribute("data-lang", lang);
      script.crossOrigin = "anonymous";
      script.async = true;
      container.appendChild(script);
    }

    function applyLang() {
      const lang = localStorage.getItem("lang") || "zh";
      const t = i18n[lang] || i18n.zh;

      document.title = t.pageTitle;
      document.getElementById("titleText").textContent = t.title;
      document.getElementById("backBtn").textContent = t.back;

      loadGiscus(t.giscusLang);

      document.querySelectorAll("#langSwitcher button").forEach(btn => {
        btn.classList.toggle("active", btn.dataset.lang === lang);
      });
    }

    document.querySelectorAll("#langSwitcher button").forEach(btn => {
      btn.onclick = () => {
        localStorage.setItem("lang", btn.dataset.lang);
        applyLang();
      };
    });

    window.addEventListener('load', () => {
      applyLang();

      // 页面解封
      document.body.classList.remove('preload');
      document.body.classList.add('fade-in');

      const loader = document.getElementById('loading');
      if (loader) {
        loader.style.opacity = '0';
        setTimeout(() => loader.remove(), 400);
      }
    });

    document.addEventListener("DOMContentLoaded", () => {
      const links = document.querySelectorAll("a[href]");
      links.forEach(link => {
        const href = link.getAttribute("href");
        if (!href.startsWith("#") && !href.startsWith("javascript")) {
          link.addEventListener("click", (e) => {
            e.preventDefault();
            document.body.classList.add("fade-out");
            setTimeout(() => window.location.href = href, 250);
          });
        }
      });
    });

    function showGlobalLoading() {
      const el = document.getElementById("loadingBar");
      if (el) el.classList.add("active");
    }

    function hideGlobalLoading() {
      const el = document.getElementById("loadingBar");
      if (el) el.classList.remove("active");
    }

    // 页面进入立即关闭 loading（防止跨页面残留）
    document.addEventListener("DOMContentLoaded", () => {
      hideGlobalLoading();
    });

    document.querySelectorAll("a").forEach(a => {
      a.addEventListener("click", () => {
        showGlobalLoading();
      });
    });
  </script>

  <div id="loadingBar" aria-hidden="true"><span class="bar"></span></div>
</body>
</html>
