<!DOCTYPE html>
<html lang="zh-cn">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>登录中...</title>
  <meta name="theme-color" content="#f7f9fa" media="(prefers-color-scheme: light)">
  <meta name="theme-color" content="#13151e" media="(prefers-color-scheme: dark)">
  <link rel="stylesheet" href="p/css/tokens.css">
  <link rel="stylesheet" href="p/css/base.css">
  <style>
    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: var(--space-4);
    }
    #app {
      font-size: var(--text-sm);
      color: var(--text-2);
      letter-spacing: 0.02em;
    }
  </style>
</head>
<body>
  <script>
    /* 首帧前应用夜间主题，避免闪色 */
    (function () {
      var hour = new Date().getHours();
      if (hour >= 18 || hour < 6) document.body.classList.add('night');
    })();
  </script>

  <div class="spinner" aria-hidden="true"></div>
  <div id="app">初始化中...</div>

<script>
console.log("🚀 callback start");

window.addEventListener("DOMContentLoaded", async () => {
  const app = document.getElementById("app") || { innerText: "" };

  try {
    const code = new URLSearchParams(location.search).get("code");
    console.log("🔑 code:", code);

    if (!code) {
      app.innerText = "❌ 没有 code";
      return;
    }

    app.innerText = "🔐 登录中...";

    console.log("🚀 准备请求 Worker");
    const res = await fetch("/vds-login", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ code })
    });

    const text = await res.text();
    console.log("📡 response status:", res.status);
    console.log("📦 raw:", text);

    let data;
    try {
      data = JSON.parse(text);
    } catch {
      app.innerText = "❌ 返回异常";
      return;
    }

    if (!data.supabase_token) {
      app.innerText = "❌ 登录失败：" + (data.error || "未知错误");
      return;
    }

    localStorage.setItem("token", data.supabase_token);
    localStorage.setItem("user", JSON.stringify(data.user));

    app.innerText = "✅ 登录成功，跳转中...";

    setTimeout(() => {
      location.href = "/ai.html";
    }, 800);

  } catch (err) {
    console.error(err);
    app.innerText = "❌ 错误：" + err.message;
  }
});

function showGlobalLoading() {
  const el = document.getElementById("loadingBar");
  if (el) el.classList.add("active");
}
function hideGlobalLoading() {
  const el = document.getElementById("loadingBar");
  if (el) el.classList.remove("active");
}
window.addEventListener("load", () => {
  showGlobalLoading();
  setTimeout(hideGlobalLoading, 400);
});
document.querySelectorAll("a").forEach(a => {
  a.addEventListener("click", () => {
    showGlobalLoading();
  });
});
</script>

  <div id="loadingBar" aria-hidden="true"><span class="bar"></span></div>
</body>
</html>
