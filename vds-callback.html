<script>
console.log("🚀 callback start");
alert("callback start");

(async () => {
  try {
    const params = new URLSearchParams(location.search);
    const code = params.get("code");

    console.log("🔑 code:", code);

    if (!code) {
      document.body.innerText = "❌ 没有 code";
      return;
    }

    document.body.innerText = "登录中...";

    const res = await fetch("https://ai.liuxizekali.workers.dev/vds-login", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ code })
    });

    console.log("🌐 response status:", res.status);

    const text = await res.text();
    console.log("📦 raw response:", text);

    let data;
    try {
      data = JSON.parse(text);
    } catch {
      document.body.innerText = "❌ 返回不是 JSON";
      return;
    }

    console.log("✅ parsed:", data);

    if (!data.supabase_token) {
      document.body.innerText = "❌ 登录失败：" + (data.error || "未知错误");
      return;
    }

    localStorage.setItem("token", data.supabase_token);
    localStorage.setItem("user", JSON.stringify(data.user));

    document.body.innerText = "✅ 登录成功";

    setTimeout(() => {
      location.href = "/ai.html";
    }, 800);

  } catch (err) {
    console.error("💥 callback error:", err);
    document.body.innerText = "❌ 错误：" + err.message;
  }
})();
</script>
