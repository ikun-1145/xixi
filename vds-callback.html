<!DOCTYPE html>
<html lang="zh-cn">
<head>
  <meta charset="UTF-8">
  <title>登录中...</title>
  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0f172a;
      color: #fff;
      font-size: 18px;
      font-family: -apple-system, BlinkMacSystemFont;
    }
  </style>
</head>
<body>
  <div id="app">初始化中...</div>

<script>
console.log("🚀 callback start");

window.addEventListener("DOMContentLoaded", async () => {
  const app = document.getElementById("app");

  try {
    const code = new URLSearchParams(location.search).get("code");
    console.log("🔑 code:", code);

    if (!code) {
      app.innerText = "❌ 没有 code";
      return;
    }

    app.innerText = "🔐 登录中...";

    const res = await fetch("https://ai.liuxizekali.workers.dev/vds-login", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ code })
    });

    const text = await res.text();
    console.log("📦 raw:", text);

    let data;
    try {
      data = JSON.parse(text);
    } catch {
      app.innerText = "❌ 返回异常";
      return;
    }

    if (!data.supabase_token) {
      app.innerText = "❌ 登录失败：" + (data.error || "未知错误");
      return;
    }

    localStorage.setItem("token", data.supabase_token);
    localStorage.setItem("user", JSON.stringify(data.user));

    app.innerText = "✅ 登录成功，跳转中...";

    setTimeout(() => {
      location.href = "/ai.html";
    }, 800);

  } catch (err) {
    console.error(err);
    app.innerText = "❌ 错误：" + err.message;
  }
});
</script>

</body>
</html>
