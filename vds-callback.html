<!DOCTYPE html>
<html lang="zh-cn">
<head>
  <meta charset="UTF-8">
  <title>登录中...</title>
  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0f172a;
      color: #fff;
      font-size: 18px;
      font-family: -apple-system, BlinkMacSystemFont;
    }
  
#loadingBar {   pointer-events: none; }  #loadingBar.active {   opacity: 1;   pointer-events: auto; }  #loadingBar img {   transform: scale(0.9);   transition: transform .25s ease; }  #loadingBar.active img {   transform: scale(1); }
</style>
</head>
<body>
  <div id="app">初始化中...</div>

<script>
console.log("🚀 callback start");

window.addEventListener("DOMContentLoaded", async () => {
  const app = document.getElementById("app") || { innerText: "" };

  try {
    const code = new URLSearchParams(location.search).get("code");
    console.log("🔑 code:", code);

    if (!code) {
      app.innerText = "❌ 没有 code";
      return;
    }

    app.innerText = "🔐 登录中...";

    console.log("🚀 准备请求 Worker");
    const res = await fetch("/vds-login", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ code })
    });

    const text = await res.text();
    console.log("📡 response status:", res.status);
    console.log("📦 raw:", text);

    let data;
    try {
      data = JSON.parse(text);
    } catch {
      app.innerText = "❌ 返回异常";
      return;
    }

    if (!data.supabase_token) {
      app.innerText = "❌ 登录失败：" + (data.error || "未知错误");
      return;
    }

    localStorage.setItem("token", data.supabase_token);
    localStorage.setItem("user", JSON.stringify(data.user));

    app.innerText = "✅ 登录成功，跳转中...";

    setTimeout(() => {
      location.href = "/ai.html";
    }, 800);

  } catch (err) {
    console.error(err);
    app.innerText = "❌ 错误：" + err.message;
  }
});

function showGlobalLoading() {   const el = document.getElementById("loadingBar");   if (el) el.classList.add("active"); }  function hideGlobalLoading() {   const el = document.getElementById("loadingBar");   if (el) el.classList.remove("active"); }
window.addEventListener("load", () => {   showGlobalLoading();   setTimeout(hideGlobalLoading, 400); });
document.querySelectorAll("a").forEach(a => {   a.addEventListener("click", () => {     showGlobalLoading();   }); });
</script>


<div id="loadingBar" style="   display:flex;   opacity:0;   transition:opacity .25s ease;    position:fixed;   inset:0;   background:rgba(0,0,0,0.45);   backdrop-filter:blur(6px);   z-index:9999;    align-items:center;   justify-content:center;   flex-direction:column; ">   <img src="p/load.gif" style="width:96px;height:96px;opacity:0.95;margin-bottom:14px;">   <div style="color:#fff;font-size:18px;opacity:0.9;font-weight:500;letter-spacing:0.5px;">     加载中   </div> </div>
</body>
</html>
