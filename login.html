<meta http-equiv="Content-Security-Policy" content="default-src * 'unsafe-inline' 'unsafe-eval' data: blob:;
script-src * 'unsafe-inline' 'unsafe-eval';
connect-src *;
img-src * data: blob:;
style-src * 'unsafe-inline';
frame-src *;
child-src *;
">

<!-- 登录后跳转目标判定：优先 URL 参数(?return=/redirect=/from=)，
     其次 localStorage.loginReturnTo，否则回落到 ai.html。
     仅允许站内 .html 文件名，避免开放重定向（open redirect）。 -->
<script>
function getPostLoginTarget() {
  var def = "ai.html";
  try {
    var t = "";
    var qs = new URLSearchParams(location.search || "");
    t = qs.get("return") || qs.get("redirect") || qs.get("from") || "";
    if (!t) { try { t = localStorage.getItem("loginReturnTo") || ""; } catch (e) {} }
    try { localStorage.removeItem("loginReturnTo"); } catch (e) {}
    t = (t || "").trim();
    if (!/^[A-Za-z0-9_\-]+\.html$/.test(t)) return def; // 只放行站内 .html 文件名
    return t;
  } catch (e) { return def; }
}

// 已登录守卫：若本地已存在 token，直接进入目标页，避免已登录用户重复登录。
// （是否过期的判断交给目标页中的 app.js 处理，过期会尝试静默刷新）
(function () {
  try {
    if (localStorage.getItem("token")) {
      location.replace(getPostLoginTarget());
    }
  } catch (e) {}
})();
</script>

<link rel="stylesheet" href="p/css/tokens.css">
<link rel="stylesheet" href="p/css/base.css">
<style>
/* ===== 登录页（依赖 tokens.css / base.css，登录逻辑不变） ===== */
html, body { height: 100%; margin: 0; }

body {
  background: var(--bg);
}

/* 静态品牌色微晕染（与首页一致，无动画） */
body::before {
  content: "";
  position: fixed;
  inset: 0;
  z-index: 0;
  background:
    radial-gradient(640px 420px at 80% -10%, var(--brand-soft), transparent 70%),
    radial-gradient(520px 380px at 10% 110%, var(--brand-soft), transparent 70%);
  pointer-events: none;
}

/* ===== 弹窗容器（保留 .modal 供原逻辑使用） ===== */
.modal {
  position: fixed;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: var(--space-4);
  z-index: 10;
  opacity: 0;
  transition: opacity var(--dur-base) ease;
  background: transparent;
  -webkit-backdrop-filter: none;
  backdrop-filter: none;
}
.modal.active { opacity: 1; display: flex; }
.modal.closing { opacity: 0; }

/* ===== 登录卡片 ===== */
.modal-content {
  position: relative;
  width: 100%;
  max-width: 420px;
  padding: var(--space-8) var(--space-8) var(--space-6);
  border-radius: var(--r-lg);
  text-align: center;
  background: var(--surface);
  border: 1px solid var(--border);
  box-shadow: var(--shadow-lg);
  animation: card-in var(--dur-slow) var(--ease);
}
@keyframes card-in {
  0% { opacity: 0; transform: translateY(10px) scale(.98); }
  100% { opacity: 1; transform: translateY(0) scale(1); }
}
.modal.closing .modal-content { animation: card-out 200ms ease forwards; }
@keyframes card-out { to { opacity: 0; transform: translateY(8px) scale(.98); } }

.close {
  position: absolute;
  top: 14px;
  right: 18px;
  font-size: 22px;
  line-height: 1;
  color: var(--text-3);
  cursor: pointer;
  transition: color var(--dur-fast) ease;
}
.close:hover { color: var(--text); }

/* ===== 品牌 / 标题 ===== */
.brand {
  width: 56px;
  height: 56px;
  margin: 0 auto var(--space-4);
  border-radius: var(--r-lg);
  overflow: hidden;
  border: 1px solid var(--border);
  box-shadow: var(--shadow-sm);
  display: flex;
  align-items: center;
  justify-content: center;
}
.brand img { width: 100%; height: 100%; object-fit: cover; display: block; }

.title {
  margin: 0 0 var(--space-1);
  font-size: var(--title-sm);
  font-weight: 700;
  color: var(--text);
  letter-spacing: -0.01em;
}
.subtitle {
  margin: 0 0 var(--space-6);
  font-size: var(--text-sm);
  color: var(--text-2);
}

/* ===== 表单 ===== */
.field { text-align: left; margin-bottom: var(--space-4); }
.field > label {
  display: block;
  margin-bottom: var(--space-2);
  font-size: var(--text-sm);
  font-weight: 600;
  color: var(--text);
}

.field input[type="email"],
.field input[type="text"],
#emailInput, #codeInput {
  width: 100%;
  height: 46px;
  padding: 0 14px;
  font-family: inherit;
  font-size: var(--text-sm);
  color: var(--text);
  border-radius: var(--r-md);
  border: 1px solid var(--border);
  background: var(--surface-2);
  outline: none;
  transition: border-color var(--dur-fast) ease, box-shadow var(--dur-fast) ease;
}
#emailInput::placeholder, #codeInput::placeholder { color: var(--text-3); }
#emailInput:focus, #codeInput:focus {
  border-color: var(--brand);
  box-shadow: 0 0 0 3px var(--brand-soft);
}

/* 验证码行：输入框 + 发送按钮 */
.code-row { display: flex; gap: var(--space-2); }
.code-row #codeInput { flex: 1; }
#sendCodeBtn {
  flex: 0 0 auto;
  min-width: 108px;
  height: 46px;
  padding: 0 12px;
  font-family: inherit;
  font-size: var(--text-sm);
  font-weight: 600;
  color: var(--brand-strong);
  border-radius: var(--r-md);
  border: 1px solid var(--border-strong);
  background: var(--surface);
  cursor: pointer;
  transition: border-color var(--dur-fast) ease, background var(--dur-fast) ease;
}
#sendCodeBtn:hover { border-color: var(--brand); background: var(--brand-soft); }
#sendCodeBtn:disabled { opacity: .6; cursor: not-allowed; }

/* 同意条款 */
.agree {
  display: flex;
  align-items: flex-start;
  gap: var(--space-2);
  margin: var(--space-1) 0 var(--space-4);
  text-align: left;
  font-size: var(--text-xs);
  color: var(--text-2);
  cursor: pointer;
}
.agree input {
  margin-top: 2px;
  width: 15px;
  height: 15px;
  accent-color: var(--brand);
  cursor: pointer;
}
.agree a { color: var(--brand-strong); text-decoration: none; }
.agree a:hover { text-decoration: underline; }

/* 登录按钮 */
#loginBtn {
  width: 100%;
  height: 48px;
  font-family: inherit;
  font-size: var(--text-base);
  font-weight: 600;
  color: var(--on-brand);
  border: none;
  border-radius: var(--r-md);
  background: var(--brand);
  cursor: pointer;
  transition: background var(--dur-fast) ease, transform var(--dur-fast) ease,
              box-shadow var(--dur-fast) ease, opacity var(--dur-fast) ease;
}
#loginBtn:hover:not(:disabled) {
  background: var(--brand-strong);
  transform: translateY(-1px);
  box-shadow: var(--shadow-md);
}
#loginBtn:disabled { cursor: not-allowed; }

#loginMsg {
  min-height: 18px;
  margin: var(--space-3) 0 0;
  font-size: var(--text-xs);
  color: #ef4444;   /* 默认红色：错误提示 */
}
#loginMsg.ok { color: #10b981; }        /* 绿色：成功提示 */

/* ===== 确保 GeeTest 人机验证浮层显示在卡片之上 ===== */
body > [class*="geetest_"] { z-index: 100000 !important; }
</style>
</head>
<script src="https://static.geetest.com/v4/gt4.js"></script>

<body>
<script>
/* 首帧前应用夜间主题，避免闪色 */
(function () {
  var hour = new Date().getHours();
  if (hour >= 18 || hour < 6) document.body.classList.add('night');
})();
</script>

<script>
(function () {
  // ====== 占位函数：保持与原 app.js 调用接口一致，避免登录逻辑报错 ======
  function showError(title, opt) {
    const detail = opt && (opt.detail || opt.code) ? `\n${opt.detail || ""} ${opt.code || ""}`.trim() : "";
    alert(title + (detail ? "\n" + detail : ""));
  }

  function showLoginPrompt() {
    if (document.getElementById("loginModal")) return;

    const modal = document.createElement("div");
    modal.id = "loginModal";
    modal.className = "modal active";

    modal.innerHTML = `
    <div class="modal-content">
      <span class="close">×</span>

      <div class="brand">
        <img src="p/ailogo.png" alt="霜蓝AI">
      </div>

      <h2 class="title">登录霜蓝AI</h2>
      <p class="subtitle">输入邮箱获取验证码，无需注册</p>

      <div class="field">
        <label for="emailInput">邮箱</label>
        <input id="emailInput" type="email" placeholder="输入邮箱">
      </div>

      <div class="field">
        <label for="codeInput">验证码</label>
        <div class="code-row">
          <input id="codeInput" type="text" inputmode="numeric" placeholder="输入验证码">
          <button id="sendCodeBtn" type="button">发送验证码</button>
        </div>
      </div>

      <label class="agree">
        <input type="checkbox" id="agreeCheck">
        <span>
          我已阅读并同意
          <a href="xukexieyi.html" target="_blank">《用户协议》</a>
          和
          <a href="privacy.html" target="_blank">《隐私政策》</a>
        </span>
      </label>

      <button id="loginBtn" type="button">登录</button>

      <p id="loginMsg"></p>
    </div>
    `;

    document.body.appendChild(modal);
    document.body.style.overflow = "hidden";

    // ===== GeeTest 预加载（模态框打开时即初始化，减少等待）=====
    function _geetestErrMsg(err, fallback) {
      if (!err) return fallback;
      return err.msg || err.desc || err.error_code || fallback;
    }

    // 动态确保 gt4.js 已加载：不依赖 HTML 中的 <script> 标签，
    // 规避正式域名 HTML 被 CDN/浏览器缓存、脚本缺失导致 initGeetest4 未定义的问题。
    function loadGeetestScript() {
      if (typeof initGeetest4 === "function") return Promise.resolve();
      if (window.__geetestLoading) return window.__geetestLoading;
      window.__geetestLoading = new Promise((resolve, reject) => {
        const s = document.createElement("script");
        s.src = "https://static.geetest.com/v4/gt4.js";
        s.async = true;
        s.onload = () => {
          if (typeof initGeetest4 === "function") resolve();
          else reject(new Error("验证脚本加载异常，请刷新重试"));
        };
        s.onerror = () => {
          window.__geetestLoading = null; // 允许下次重试
          reject(new Error("验证脚本加载失败，请检查网络或稍后重试"));
        };
        document.head.appendChild(s);
      });
      return window.__geetestLoading;
    }

    function _newCaptchaPromise() {
      return loadGeetestScript().then(() => new Promise((resolve, reject) => {
        initGeetest4({
          captchaId: "ad3a8126afe716ccd4541f35d428071e",
          product: "bind"
        }, function (obj) {
          obj.onReady(() => resolve(obj));
          obj.onError((err) => {
            console.error("GeeTest 初始化失败:", err);
            reject(new Error(_geetestErrMsg(err, "人机验证加载失败")));
          });
        });
      }));
    }
    let _captchaPromise = _newCaptchaPromise();
    // 防止预加载阶段 promise 被拒绝时产生未捕获异常
    _captchaPromise.catch(() => {});

    // ===== GeeTest 验证函数 =====
    async function runCaptcha() {
      const captchaObj = await _captchaPromise;
      // ⭐ 关键修复：将验证码挂到 body，避免被 modal / transform 影响
      if (captchaObj && typeof captchaObj.appendTo === "function") {
        captchaObj.appendTo(document.body);
        // 更激进的修复，确保验证码浮层完全盖住所有内容
        setTimeout(() => {
          const geetest = document.querySelector(".geetest_holder");
          if (geetest) {
            geetest.style.position = "fixed";
            geetest.style.zIndex = "999999999"; // ⭐ 提升到极限层级
            geetest.style.left = "50%";
            geetest.style.top = "50%";
            geetest.style.transform = "translate(-50%, -50%)";

            // ⭐ 关键：脱离父层 stacking context
            geetest.style.pointerEvents = "auto";

            // ⭐ 强制插到 body 最后（盖过所有遮罩）
            document.body.appendChild(geetest);
          }

          // ⭐ 把 modal 的遮罩压到下面
          const m = document.querySelector(".modal");
          if (m) {
            m.style.zIndex = "1000";
          }
        }, 0);
      }
      return new Promise((resolve, reject) => {
        captchaObj.onSuccess(function () {
          const result = captchaObj.getValidate();
          _captchaPromise = _newCaptchaPromise();
          _captchaPromise.catch(() => {});
          resolve(JSON.stringify(result));
        });
        captchaObj.onError(function (err) {
          console.error("GeeTest 验证失败:", err);
          _captchaPromise = _newCaptchaPromise();
          _captchaPromise.catch(() => {});
          reject(new Error(_geetestErrMsg(err, "验证失败")));
        });
        captchaObj.showCaptcha();
      });
    }

    const emailInput = modal.querySelector("#emailInput");
    const codeInput = modal.querySelector("#codeInput");
    const sendBtn = modal.querySelector("#sendCodeBtn");
    const loginBtn = modal.querySelector("#loginBtn");
    const msg = modal.querySelector("#loginMsg");
    const agreeCheck = modal.querySelector("#agreeCheck");
    loginBtn.disabled = true;
    loginBtn.style.opacity = "0.6";

    agreeCheck.onchange = () => {
      loginBtn.disabled = !agreeCheck.checked;
      loginBtn.style.opacity = agreeCheck.checked ? "1" : "0.6";
    };

    let cooldown = 0;
    let timer = null;

    // ===== 发送验证码 =====
    sendBtn.onclick = async () => {
      if (cooldown > 0) return;
      msg.classList.remove("ok"); // 复位为错误色，成功时再标记

      const email = emailInput.value.trim();

      if (!email) {
        msg.innerText = "请输入邮箱";
        return;
      }

      if (!/^\S+@\S+\.\S+$/.test(email)) {
        msg.innerText = "邮箱格式错误";
        return;
      }

      msg.innerText = "人机验证加载中...";
      sendBtn.disabled = true;
      let token;
      try {
        token = await runCaptcha();
        msg.innerText = "";
      } catch (e) {
        msg.innerText = e.message;
        sendBtn.disabled = false;
        return;
      }
      sendBtn.disabled = false;

      try {
        msg.innerText = "";
        sendBtn.disabled = true;
        sendBtn.innerText = "发送中...";

        const res = await fetch("https://api.sunland.dev/send-code", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({
            email,
            token: token
          })
        });

        const data = await res.json().catch(() => ({}));

        console.log("send-code 返回:", res.status, data);

        if (!res.ok) {
          let errMsg = "服务器异常";
          try {
            errMsg = data.error || errMsg;
          } catch {}
          throw new Error(errMsg + ` (状态码 ${res.status})`);
        }

        if (data.error) {
          throw new Error(data.error);
        }

        msg.innerText = "验证码已发送（有效期约5分钟）";
        msg.classList.add("ok"); // 成功提示用绿色

        // 开始倒计时
        cooldown = 60;
        sendBtn.innerText = "60s";

        timer = setInterval(() => {
          cooldown--;
          sendBtn.innerText = cooldown + "s";

          if (cooldown <= 0) {
            clearInterval(timer);
            sendBtn.innerText = "发送验证码";
            sendBtn.disabled = false;
          }
        }, 1000);

      } catch (e) {
        console.error(e);
        if (e.message === "Failed to fetch") {
          msg.innerText = "网络连接失败（API不可达）";
        } else {
          showError("发送验证码失败", {
            detail: e.message
          });
        }

        // 失败也恢复按钮
        sendBtn.disabled = false;
        sendBtn.innerText = "发送验证码";
      }
    };

    // ===== 登录 =====
    loginBtn.onclick = async () => {
      msg.classList.remove("ok"); // 复位为错误色，成功时再标记
      if (!agreeCheck.checked) {
        msg.innerText = "请先同意用户协议";
        return;
      }
      const email = emailInput.value.trim();
      const code = codeInput.value.trim();

      if (!/^\d{6}$/.test(code)) {
        msg.innerText = "验证码格式错误";
        return;
      }

      try {
        const res = await fetch("https://api.sunland.dev/verify-code", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            email,
            code
          })
        });

        let data;
        try {
          data = await res.json();
        } catch (e) {
          console.error("JSON解析失败:", e);
          showError("服务器返回异常", {
            detail: "接口未返回JSON"
          });
          return;
        }

        console.log("verify-code 返回:", res.status, data);

        if (!res.ok) {
          let errMsg = data?.error || "服务器异常";

          if (res.status === 400) {
            msg.innerText = "请求错误：" + errMsg;
          } else if (res.status === 401) {
            showError("验证码错误或已过期", {
              code: res.status,
              detail: data?.error
            });
          } else if (res.status === 429) {
            msg.innerText = "请求过于频繁，请稍后再试";
          } else if (res.status >= 500) {
            showError("服务器开小差了", {
              code: res.status,
              detail: data?.error
            });
          } else {
            msg.innerText = errMsg + ` (${res.status})`;
          }

          console.error("登录接口错误:", res.status, data);
          return;
        }

        if (!data.token) {
          msg.innerText = data.error || "验证码错误或已过期";
          return;
        }

        localStorage.setItem("token", data.token);
        localStorage.setItem("user", JSON.stringify(data.user));

        msg.innerText = "登录成功";
        msg.classList.add("ok"); // 成功提示用绿色

        // 登录成功后回到来源页（默认 ai.html），由目标页的 app.js 完成会话恢复与云端同步
        var postTarget = getPostLoginTarget();
        setTimeout(() => {
          modal.remove();
          location.href = postTarget;
        }, 800);

      } catch (e) {
        console.error("登录异常:", e);

        if (e.message && e.message.includes("fetch")) {
          msg.innerText = "网络异常（可能被拦截或断网）";
        } else if (e.message && e.message.includes("验证")) {
          msg.innerText = "人机验证失效，请重新验证";
        } else if (e.message && e.message.includes("timeout")) {
          msg.innerText = "请求超时，请重试";
        } else {
          showError("登录异常", {
            detail: e.message
          });
        }
      }
    };

    function closeModal() {
      modal.classList.add("closing");
      document.body.style.overflow = "";
      // 独立登录页：关闭后返回首页（避免留下空白页面）
      setTimeout(() => { location.href = "index.html"; }, 200);
    }

    modal.querySelector(".close").onclick = closeModal;
  }

  window.showLoginPrompt = showLoginPrompt;

  // 进入页面即展示登录窗口
  showLoginPrompt();
})();
</script>
