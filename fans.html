<!DOCTYPE html>
<html lang="zh-Hans">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <script>
    (function() {
      const hour = new Date().getHours();
      if (hour >= 18 || hour < 6) {
        document.documentElement.classList.add('night');
      }
    })();
  </script>
  <title id="pageTitle">实时粉丝数 - 霜蓝</title>
  <meta name="theme-color" content="#f7f9fa" media="(prefers-color-scheme: light)">
  <meta name="theme-color" content="#13151e" media="(prefers-color-scheme: dark)">
  <link rel="stylesheet" href="p/css/tokens.css">
  <link rel="stylesheet" href="p/css/base.css">
  <style>
    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      overflow: hidden;
    }

    /* 静态品牌色微晕染（与首页一致） */
    body::before {
      content: "";
      position: fixed;
      inset: 0;
      z-index: -1;
      background:
        radial-gradient(640px 420px at 50% 0%, var(--brand-soft), transparent 70%);
      pointer-events: none;
    }

    .container {
      width: 100%;
      padding: 0 5vw;
      text-align: center;
      animation: stat-reveal 0.9s var(--ease) both;
    }

    @keyframes stat-reveal {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: none; }
    }

    h1 {
      font-size: var(--text-sm);
      font-weight: 600;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--text-3);
      margin-bottom: var(--space-6);
    }

    .fan-count {
      display: block;
      font-size: clamp(56px, 15vw, 140px);
      font-weight: 800;
      letter-spacing: -0.02em;
      line-height: 1;
      color: var(--text);
      font-variant-numeric: tabular-nums;
      font-feature-settings: "tnum" 1;
      word-break: break-all;
      margin-bottom: var(--space-6);
      transform-origin: center bottom;
      transition: transform 0.8s cubic-bezier(0.22, 1, 0.36, 1);
    }

    .fan-count.settle { transform: scale(1.03); }

    .update-time {
      margin: 0 0 var(--space-2);
      font-size: var(--text-xs);
      letter-spacing: 0.05em;
      color: var(--text-3);
    }

    .thanks {
      margin: 0 0 var(--space-8);
      font-size: var(--text-base);
      color: var(--text-2);
    }

    footer {
      position: fixed;
      bottom: var(--space-4);
      left: 0;
      width: 100%;
      margin: 0;
    }
  </style>
</head>
<body>

  <div class="container">
    <h1 id="titleText"></h1>
    <div class="fan-count" id="fanCount"></div>
    <p class="update-time" id="updateTime"></p>
    <p class="thanks" id="thanksText"></p>
    <a href="index.html" class="back btn btn-secondary" id="backBtn"></a>
  </div>

  <footer class="site-footer">© 2024–2026 霜蓝 · All Rights Reserved.</footer>

  <!-- 动效脚本 -->
  <script>
    /* --------- i18n --------- */
    const i18n = {
      zh: {
        pageTitle: "实时粉丝数 - 霜蓝",
        title: "实时粉丝数",
        thanks: "感谢大家的支持与陪伴！",
        back: "← 返回主页",
        updatePrefix: "数据更新时间："
      },
      en: {
        pageTitle: "Live Fans Count - Sunland",
        title: "Live Fans Count",
        thanks: "Thank you all for your support!",
        back: "← Back to Home",
        updatePrefix: "Last updated: "
      },
      ja: {
        pageTitle: "フォロワー数 - フロスト",
        title: "フォロワー数",
        thanks: "いつも応援ありがとうございます！",
        back: "← ホームへ戻る",
        updatePrefix: "更新日時："
      }
    };

    const currentLang = localStorage.getItem("lang") || "zh";
    const t = i18n[currentLang] || i18n.zh;

    document.title = t.pageTitle;
    document.getElementById("titleText").textContent = t.title;
    document.getElementById("thanksText").textContent = t.thanks;
    document.getElementById("backBtn").textContent = t.back;

    const fanCount = 28519;
    const updateTime = "2026年7月6日 11:42";

    // 更新时间
    document.getElementById('updateTime').textContent = `${t.updatePrefix}${updateTime}`;

    const fanCountContainer = document.getElementById('fanCount');
    const end = fanCount;

    // 数字滚动动画（双 RAF 启动版）
    fanCountContainer.textContent = '0';

    const duration = 1600;

    requestAnimationFrame(() => {
      requestAnimationFrame(() => {
        const startTime = performance.now();

        function animateCount(now) {
          const progress = Math.min((now - startTime) / duration, 1);
          const eased = 1 - Math.pow(1 - progress, 3);
          const current = Math.floor(eased * end);

          if (progress < 1) {
            fanCountContainer.textContent = current.toLocaleString();
            requestAnimationFrame(animateCount);
          } else {
            fanCountContainer.textContent = end.toLocaleString();
            fanCountContainer.classList.add('settle');

            setTimeout(() => {
              fanCountContainer.classList.remove('settle');
            }, 600);
          }
        }

        requestAnimationFrame(animateCount);
      });
    });

    function showGlobalLoading() {
      const el = document.getElementById("loadingBar");
      if (el) el.classList.add("active");
    }

    function hideGlobalLoading() {
      const el = document.getElementById("loadingBar");
      if (el) el.classList.remove("active");
    }

    // 页面进入立即关闭 loading（防止跨页面残留）
    document.addEventListener("DOMContentLoaded", () => {
      hideGlobalLoading();
    });

    document.querySelectorAll("a").forEach(a => {
      a.addEventListener("click", () => {
        showGlobalLoading();
      });
    });
  </script>

  <div id="loadingBar" aria-hidden="true"><span class="bar"></span></div>
</body>
</html>
