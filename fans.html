<!DOCTYPE html>
<html lang="zh-Hans">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <script>
    (function() {
      const hour = new Date().getHours();
      if (hour >= 18 || hour < 6) {
        document.documentElement.classList.add('night');
      }
    })();
  </script>
  <link rel="preload" as="image" href="p/fans.png">
  <title id="pageTitle">实时粉丝数 - 霜蓝</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      /* 日间主题 */
      --bg-main: none;
      --card-bg: rgba(255,255,255,0.5);
      --text-main: #1A1A1A;
      --accent: #71f8fc;
    }

    /* 夜间主题（donate 同款） */
    html.night body {
      background-color: #0f1822; /* 夜间基础色，防止首帧闪亮 */
      --bg-main: #161823;
      --card-bg: rgba(22,24,35,0.9);
      --text-main: #E8FFFF;
      --accent: #3EEDE7;
      background:
        linear-gradient(
          to bottom,
          rgba(10,15,25,0.65),
          rgba(10,15,25,0.85)
        ),
        url('p/fans.png') center / cover no-repeat;
    }


    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI",
                   "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei",
                   "Noto Sans CJK SC", "Source Han Sans SC",
                   Arial, sans-serif;
      background: #f0f6f8 url('p/fans.png') center / cover no-repeat fixed;
      display: flex;
      flex-direction: column;
      align-items: center;
      height: 100vh;
      color: var(--text-main);
      overflow: hidden;
      perspective: 1200px;
      transition: filter 0.6s ease;
      opacity: 1;
    }


    .container {
      margin-top: 8vh;
      padding: 0;
      width: 100%;
      max-width: none;
      background: none;
      backdrop-filter: none;
      border-radius: 0;
      box-shadow: none;
      text-align: center;
      padding: 0 5vw;
      transform-style: preserve-3d;
    }

    @keyframes settleScale {
      0% { transform: scale(1); }
      50% { transform: scale(1.015); }
      100% { transform: scale(1); }
    }

    @keyframes glowPulse {
      0% {
        text-shadow:
          0 25px 60px rgba(0,0,0,0.35),
          0 8px 18px rgba(0,0,0,0.25);
      }
      50% {
        text-shadow:
          0 28px 70px rgba(0,0,0,0.4),
          0 10px 22px rgba(0,0,0,0.3);
      }
      100% {
        text-shadow:
          0 25px 60px rgba(0,0,0,0.35),
          0 8px 18px rgba(0,0,0,0.25);
      }
    }

    @keyframes monumentReveal {
      0% {
        opacity: 0;
        transform: translateY(40px) scale(0.92);
        filter: blur(8px);
      }
      100% {
        opacity: 1;
        transform: translateY(0) scale(1);
        filter: blur(0);
      }
    }

    @keyframes flashPeak {
      0% { filter: brightness(1); }
      40% { filter: brightness(1.35); }
      100% { filter: brightness(1); }
    }

    html.night .digit {
      box-shadow: 0 0 18px rgba(62,237,231,0.6);
    }


    h1 {
      font-size: clamp(1.4rem, 4.5vw, 2rem);
      margin-bottom: 1.5rem;
      font-weight: 500;
      letter-spacing: 0.12em;
      opacity: 0.75;
    }

    .fan-count {
      display: block;
      text-align: center;
      font-size: clamp(4rem, 16vw, 12rem);
      font-weight: 900;
      font-feature-settings: "tnum" 1;
      letter-spacing: 0.05em;
      transform: translateY(0) scale(1);
      filter: blur(0px);
      transform-origin: center bottom;
      transition: transform 0.8s cubic-bezier(0.22, 1, 0.36, 1);
      animation: monumentReveal 1.4s cubic-bezier(0.22, 1, 0.36, 1) both;
      margin-bottom: 1.8rem;
      line-height: 1;
      word-break: break-all;
      font-variant-numeric: tabular-nums;
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", "Noto Sans CJK SC", Arial, sans-serif;
      color: #f8f6f2;
      text-shadow:
        0 28px 55px rgba(0,0,0,0.38),
        0 8px 18px rgba(0,0,0,0.28);
      position: relative;
      isolation: isolate;
    }

    .fan-count.settle {
      transform: scale(1.06);
    }


    html.night .fan-count {
      color: #cfffff;
      text-shadow:
        0 0 25px rgba(62,237,231,0.45),
        0 35px 90px rgba(0,0,0,0.7);
    }


    .update-time {
      font-size: 0.85rem;
      color: rgba(0,0,0,0.5);
      margin-bottom: 1rem;
      letter-spacing: 0.05em;
    }

    .thanks {
      font-size: 1rem;
      margin-bottom: 1.5rem;
      opacity: 0.85;
    }

    .back {
      display: inline-block;
      padding: 0.8rem 1.5rem;
      background: linear-gradient(to right, var(--accent), #a0fff8);
      border-radius: 30px;
      text-decoration: none;
      color: black;
      font-weight: bold;
      font-size: 1.1rem;
      transition: transform 0.3s ease;
    }

    .back:hover {
      transform: translateY(-3px);
    }

    footer {
      position: fixed;
      bottom: 1rem;
      left: 0;
      width: 100%;
      text-align: center;
      font-size: 0.9rem;
      color: #000;
    }


    /* iPad / Tablet 优化 */
    @media (max-width: 1024px) {
      .fan-count {
        margin-bottom: 2rem;
      }

      .back {
        font-size: 1rem;
        padding: 0.7rem 1.3rem;
      }

      footer {
        font-size: 0.8rem;
        padding: 0 4vw;
        text-align: center;
      }
    }
  </style>
</head>
<body>

  <div class="container">
    <h1 id="titleText"></h1>
    <div class="fan-count" id="fanCount"></div>
    <p class="update-time" id="updateTime"></p>
    <p class="thanks" id="thanksText"></p>
    <a href="index.html" class="back" id="backBtn"></a>
  </div>

  <footer>Copyright©️2024-2026霜蓝, All Rights Reserved.</footer>

  <!-- 动效脚本 -->
  <script>
    


    /* --------- i18n --------- */
    const i18n = {
      zh: {
        pageTitle: "实时粉丝数 - 霜蓝",
        title: "实时粉丝数",
        thanks: "感谢大家的支持与陪伴！",
        back: "← 返回主页",
        updatePrefix: "数据更新时间："
      },
      en: {
        pageTitle: "Live Fans Count - Sunland",
        title: "Live Fans Count",
        thanks: "Thank you all for your support!",
        back: "← Back to Home",
        updatePrefix: "Last updated: "
      },
      ja: {
        pageTitle: "フォロワー数 - フロスト",
        title: "フォロワー数",
        thanks: "いつも応援ありがとうございます！",
        back: "← ホームへ戻る",
        updatePrefix: "更新日時："
      }
    };

    const currentLang = localStorage.getItem("lang") || "zh";
    const t = i18n[currentLang] || i18n.zh;

    document.getElementById("titleText").textContent = t.title;
    document.getElementById("thanksText").textContent = t.thanks;
    document.getElementById("backBtn").textContent = t.back;

    const fanCount = 26906;
    const updateTime = "2026年4月4日 12:11";

    // 更新时间
    document.getElementById('updateTime').textContent = `${t.updatePrefix}${updateTime}`;

const fanCountContainer = document.getElementById('fanCount');
const end = fanCount;

// 数字滚动动画（双 RAF 启动版）
fanCountContainer.textContent = '0';

const duration = 1600;

requestAnimationFrame(() => {
  requestAnimationFrame(() => {
    const startTime = performance.now();

    function animateCount(now) {
      const progress = Math.min((now - startTime) / duration, 1);
      const eased = 1 - Math.pow(1 - progress, 3);
      const current = Math.floor(eased * end);

      if (progress < 1) {
        fanCountContainer.textContent = current.toLocaleString();
        requestAnimationFrame(animateCount);
      } else {
        fanCountContainer.classList.add('settle');

        setTimeout(() => {
          fanCountContainer.classList.remove('settle');
        }, 600);
      }
    }

    requestAnimationFrame(animateCount);
  });
});

  </script>
</body>
</html>
