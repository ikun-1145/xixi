<!DOCTYPE html>
<html lang="zh-Hans">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>登录处理中…</title>
</head>
<body>
  <script type="module">
    import { supabase } from './p/js/supabaseClient.js';

    // 关键：让 Supabase 读取 URL hash 并写入 session
    await supabase.auth.getSession();

    // 根据来源跳转回对应页面
    const returnTo =
      localStorage.getItem('returnTo') ||
      sessionStorage.getItem('returnTo');

    // 清理标记，避免下次误跳
    localStorage.removeItem('returnTo');
    sessionStorage.removeItem('returnTo');

    if (returnTo === 'ai') {
      location.replace('/ai.html');
    } else {
      location.replace('/index.html');
    }
  </script>
</body>
</html>
