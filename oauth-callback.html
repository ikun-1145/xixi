<!DOCTYPE html>
<html lang="zh-Hans">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>登录处理中…</title>
  <meta name="theme-color" content="#f7f9fa" media="(prefers-color-scheme: light)">
  <meta name="theme-color" content="#13151e" media="(prefers-color-scheme: dark)">
  <link rel="stylesheet" href="p/css/tokens.css">
  <link rel="stylesheet" href="p/css/base.css">
  <style>
    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: var(--space-4);
    }
    .status-text {
      font-size: var(--text-sm);
      color: var(--text-2);
      letter-spacing: 0.02em;
    }
  </style>
</head>
<body>
  <script>
    /* 首帧前应用夜间主题，避免闪色 */
    (function () {
      var hour = new Date().getHours();
      if (hour >= 18 || hour < 6) document.body.classList.add('night');
    })();
  </script>

  <div class="spinner" aria-hidden="true"></div>
  <div class="status-text">登录处理中…</div>

  <script type="module">
    import { supabase } from './p/js/supabaseClient.js';

    // ⭐ 等待 session 真正可用（避免偶发卡住或跳转失败）
    let tries = 0;
    let session = null;

    while (tries < 10) {
      const { data } = await supabase.auth.getSession();
      session = data.session;

      if (session) break;

      await new Promise(r => setTimeout(r, 300));
      tries++;
    }

    console.log("OAuth callback session:", session);

    // ⭐ 优先使用 URL 参数（更可靠）
    const params = new URLSearchParams(location.search);
    const redirect = params.get('redirect');

    // ⭐ 站内来源页（如评论副驾驶 copilot.html 等）：登录后回到该页面。
    //    loginReturnTo 在 localStorage 中可跨 OAuth 往返保留；只放行站内 .html 文件名。
    let loginReturnTo = '';
    try { loginReturnTo = (localStorage.getItem('loginReturnTo') || '').trim(); } catch (e) {}
    try { localStorage.removeItem('loginReturnTo'); } catch (e) {}
    const safeReturn = /^[A-Za-z0-9_\-]+\.html$/.test(loginReturnTo) ? loginReturnTo : '';

    if (safeReturn) {
      location.replace('/' + safeReturn);
    } else if (redirect === 'ai') {
      location.replace('/ai.html');
    } else {
      // 兼容旧逻辑（fallback）
      const returnTo =
        localStorage.getItem('returnTo') ||
        sessionStorage.getItem('returnTo');

      localStorage.removeItem('returnTo');
      sessionStorage.removeItem('returnTo');

      if (returnTo === 'ai') {
        location.replace('/ai.html');
      } else {
        location.replace('/index.html');
      }
    }

    // ⭐ 清理 URL（避免重复触发）
    history.replaceState(null, '', location.pathname);

    function showGlobalLoading() {
      const el = document.getElementById("loadingBar");
      if (el) el.classList.add("active");
    }
    function hideGlobalLoading() {
      const el = document.getElementById("loadingBar");
      if (el) el.classList.remove("active");
    }
    window.addEventListener("load", () => {
      showGlobalLoading();
      setTimeout(hideGlobalLoading, 400);
    });
    document.querySelectorAll("a").forEach(a => {
      a.addEventListener("click", () => {
        showGlobalLoading();
      });
    });
  </script>

  <div id="loadingBar" aria-hidden="true"><span class="bar"></span></div>
</body>
</html>
