<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>设置 - 霜蓝 AI</title>
  <style>
    :root {
      --accent: #22d3ee;
      --accent2: #67e8f9;
      --pro: #a78bfa;
      --pro2: #7c3aed;
      --danger: #ef4444;
      --bg: #f0f7ff;
      --surface: rgba(255,255,255,0.85);
      --border: rgba(0,0,0,0.06);
      --text: #0f172a;
      --subtext: #64748b;
      --shadow: 0 8px 32px rgba(34,211,238,0.08), 0 2px 8px rgba(0,0,0,0.06);
      --bg-dark: #020617;
--surface-dark: rgba(15,23,42,0.72);
--border-dark: rgba(255,255,255,0.08);
--text-dark: #e2e8f0;
--subtext-dark: #94a3b8;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, "PingFang SC", "Hiragino Sans GB", sans-serif;
      -webkit-font-smoothing: antialiased;
    }

    /* Animated background */
    body::before {
      content: "";
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
      background:
        radial-gradient(ellipse 60% 40% at 20% 10%, rgba(34,211,238,0.12) 0%, transparent 70%),
        radial-gradient(ellipse 50% 60% at 80% 90%, rgba(167,139,250,0.10) 0%, transparent 70%),
        radial-gradient(ellipse 80% 40% at 50% 50%, rgba(103,232,249,0.06) 0%, transparent 80%);
      animation: bgShift 14s ease-in-out infinite alternate;
    }

    @keyframes bgShift {
      0%   { opacity: 0.7; transform: scale(1); }
      100% { opacity: 1;   transform: scale(1.05); }
    }

    /* Header */
    .header {
      position: sticky;
      top: 0;
      z-index: 100;
      height: 52px;
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 0 20px;
      background: rgba(240,247,255,0.85);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border-bottom: 1px solid rgba(34,211,238,0.12);
    }

    .back-btn {
      width: 32px; height: 32px;
      border-radius: 10px;
      background: rgba(34,211,238,0.1);
      border: none;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      color: var(--accent);
      font-size: 16px;
      transition: background .18s, transform .15s;
      flex-shrink: 0;
    }
    .back-btn:hover { background: rgba(34,211,238,0.18); transform: translateX(-2px); }

    .header-title {
      font-size: 15px;
      font-weight: 700;
      letter-spacing: 0.2px;
      color: var(--text);
    }

    /* Page wrapper */
    .page {
      position: relative;
      z-index: 1;
      max-width: 580px;
      margin: 0 auto;
      padding: 20px 16px 48px;
    }

    /* Avatar hero */
    .avatar-hero {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      padding: 28px 0 20px;
      animation: fadeUp .4s ease both;
    }
    body.dark {
  background: var(--bg-dark);
  color: var(--text-dark);
  color: #f1f5f9;
}
  body.dark .header {
  background: rgba(2,6,23,0.7);
  border-bottom: 1px solid rgba(34,211,238,0.18);
}
body.dark .card {
  background: var(--surface-dark);
  border: 1px solid var(--border-dark);
  box-shadow: 0 8px 32px rgba(0,0,0,0.45);
}
body.dark .row:hover {
  background: rgba(34,211,238,0.06);
}
body.dark .row-label {
  color: #f1f5f9;
}

body.dark .row-value {
  color: #cbd5f5;
}

body.dark .section-label {
  color: #94a3b8;
}
body.dark .footer {
  color: rgba(148,163,184,0.5);
}

body.dark .hero-name {
  color: #f8fafc;
}

body.dark .avatar-upload-hint {
  color: #94a3b8;
}

body.dark .usage-label {
  color: #e2e8f0;
}

body.dark .usage-hint {
  color: #94a3b8;
}
    .avatar-ring {
      width: 76px; height: 76px;
      border-radius: 50%;
      padding: 3px;
      background: linear-gradient(135deg, var(--accent), var(--pro));
      box-shadow: 0 0 0 4px rgba(34,211,238,0.15), 0 8px 24px rgba(34,211,238,0.2);
      cursor: pointer;
      position: relative;
      transition: transform .18s, box-shadow .18s;
    }
    .avatar-ring:hover {
      transform: translateY(-2px) scale(1.02);
      box-shadow: 0 0 0 5px rgba(34,211,238,0.18), 0 12px 30px rgba(34,211,238,0.26);
    }
    .avatar-ring::after {
      content: "📷";
      position: absolute;
      right: -2px;
      bottom: -2px;
      width: 24px;
      height: 24px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(15,23,42,0.9);
      color: #fff;
      font-size: 12px;
      border: 2px solid #fff;
      box-shadow: 0 4px 12px rgba(15,23,42,0.18);
    }
    .avatar-ring.uploading::before {
      content: "";
      position: absolute;
      inset: -5px;
      border-radius: 50%;
      border: 2px solid transparent;
      border-top-color: var(--accent);
      border-right-color: var(--pro);
      animation: avatarSpin .8s linear infinite;
    }
    @keyframes avatarSpin {
      to { transform: rotate(360deg); }
    }

    .avatar-inner {
      width: 100%; height: 100%;
      border-radius: 50%;
      background: linear-gradient(135deg, #e0f2fe, #f0fdf4);
      display: flex; align-items: center; justify-content: center;
      font-size: 28px;
      font-weight: 700;
      color: #0f172a;
      letter-spacing: -1px;
      overflow: hidden;
      pointer-events: none;
    }
    .avatar-inner img { width: 100%; height: 100%; object-fit: cover; border-radius: 50%; }

    .avatar-upload-hint,
    .avatar-upload-status {
      font-size: 11px;
      color: var(--subtext);
    }
    .avatar-upload-status {
      min-height: 14px;
      color: var(--accent);
    }

    .hero-name {
      font-size: 17px;
      font-weight: 700;
      color: var(--text);
    }

    .hero-badge {
      font-size: 12px;
      padding: 3px 10px;
      border-radius: 20px;
      font-weight: 600;
      letter-spacing: 0.3px;
    }
    .hero-badge.free {
      background: rgba(100,116,139,0.1);
      color: var(--subtext);
    }
    .hero-badge.pro {
      background: linear-gradient(135deg, rgba(167,139,250,0.2), rgba(34,211,238,0.2));
      color: var(--pro2);
      border: 1px solid rgba(167,139,250,0.3);
    }

    /* Section label */
    .section-label {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.8px;
      text-transform: uppercase;
      color: var(--subtext);
      margin: 20px 0 8px 4px;
      animation: fadeUp .4s ease both;
    }

    /* Card */
    .card {
      background: var(--surface);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border-radius: 18px;
      border: 1px solid rgba(255,255,255,0.7);
      box-shadow: var(--shadow);
      overflow: hidden;
      margin-bottom: 12px;
      animation: fadeUp .4s ease both;
    }

    body.dark .card {
      backdrop-filter: blur(20px);
    }

    .row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 16px;
      border-bottom: 1px solid var(--border);
      font-size: 14px;
      gap: 12px;
      transition: background .15s;
    }
    .row:last-child { border-bottom: none; }
    .row:hover { background: rgba(34,211,238,0.03); }

    .row-left {
      display: flex;
      align-items: center;
      gap: 10px;
      color: var(--subtext);
    }

    .row-icon {
      width: 30px; height: 30px;
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-size: 15px;
      flex-shrink: 0;
    }

    .row-label {
      font-size: 14px;
      color: var(--text);
      font-weight: 500;
    }
    .row-label small {
      display: block;
      font-size: 11px;
      color: var(--subtext);
      font-weight: 400;
      margin-top: 1px;
    }

    .row-value {
      font-size: 13px;
      color: var(--subtext);
      text-align: right;
      max-width: 55%;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .row-value.accent { color: var(--accent); font-weight: 600; }
    .row-value.pro-badge {
      background: linear-gradient(135deg, var(--accent), var(--pro));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      font-weight: 700;
    }

    /* Usage bar */
    .usage-wrap {
      padding: 14px 16px;
    }
    .usage-top {
      display: flex; justify-content: space-between; align-items: baseline;
      margin-bottom: 8px;
    }
    .usage-left {
      display: flex; align-items: center; gap: 10px;
    }
    .usage-label { font-size: 14px; font-weight: 500; color: var(--text); }
    .usage-count { font-size: 13px; font-weight: 600; color: var(--accent); }
    .usage-bar-bg {
      height: 6px;
      background: rgba(34,211,238,0.12);
      border-radius: 99px;
      overflow: hidden;
    }
    .usage-bar-fill {
      height: 100%;
      border-radius: 99px;
      background: linear-gradient(90deg, var(--accent), var(--pro));
      transition: width .6s cubic-bezier(0.34,1.2,0.64,1);
      width: 0%;
    }
    .usage-hint {
      font-size: 11px;
      color: var(--subtext);
      margin-top: 6px;
    }

    /* Pro card */
    .pro-card {
      background: linear-gradient(135deg,
        rgba(34,211,238,0.12) 0%,
        rgba(167,139,250,0.14) 60%,
        rgba(34,211,238,0.08) 100%
      );
      border: 1px solid rgba(167,139,250,0.25);
    }
    .pro-card.activated {
      position: relative;
      overflow: hidden;
      background: linear-gradient(120deg,
        rgba(34,211,238,0.18) 0%,
        rgba(16,185,129,0.18) 28%,
        rgba(167,139,250,0.22) 58%,
        rgba(34,211,238,0.16) 100%
      );
      background-size: 280% 280%;
      border-color: rgba(34,211,238,0.38);
      animation: proFlow 5.8s ease-in-out infinite;
    }
    .pro-card.activated::before {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(105deg, transparent 20%, rgba(255,255,255,0.38) 46%, transparent 72%);
      transform: translateX(-120%);
      animation: proShine 3.4s ease-in-out infinite;
      pointer-events: none;
    }
    @keyframes proFlow {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }
    @keyframes proShine {
      0%, 35% { transform: translateX(-120%); }
      70%, 100% { transform: translateX(120%); }
    }

    .pro-inner {
      padding: 20px 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .pro-header {
      display: flex; align-items: center; gap: 10px;
    }

    .pro-gem {
      width: 40px; height: 40px;
      border-radius: 12px;
      background: linear-gradient(135deg, #22d3ee, #a78bfa);
      display: flex; align-items: center; justify-content: center;
      font-size: 20px;
      box-shadow: 0 4px 14px rgba(167,139,250,0.35);
    }

    .pro-title { font-size: 16px; font-weight: 700; }
    .pro-sub { font-size: 12px; color: var(--subtext); margin-top: 1px; }

    .pro-features {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 6px;
    }

    .pro-feat {
      display: flex; align-items: center; gap: 6px;
      font-size: 12px;
      color: var(--subtext);
    }
    .pro-feat::before {
      content: "✓";
      width: 16px; height: 16px;
      border-radius: 50%;
      background: rgba(34,211,238,0.15);
      color: var(--accent);
      display: flex; align-items: center; justify-content: center;
      font-size: 10px;
      font-weight: 700;
      flex-shrink: 0;
    }

    .btn-pro {
      width: 100%;
      padding: 13px;
      border-radius: 14px;
      border: none;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      letter-spacing: 0.3px;
      background: linear-gradient(135deg, #22d3ee, #a78bfa);
      color: white;
      box-shadow: 0 6px 20px rgba(167,139,250,0.35);
      transition: transform .18s, box-shadow .18s;
      position: relative;
      overflow: hidden;
    }
    .btn-pro::after {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(255,255,255,0.15), transparent);
    }
    .btn-pro:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 28px rgba(167,139,250,0.45);
    }
    .btn-pro:active { transform: scale(0.97); }

    /* Activated state */
    .activated-banner {
      display: flex; align-items: center; gap: 10px;
      padding: 14px 16px;
    }
    .activated-icon {
      font-size: 22px;
    }
    .activated-text { font-size: 14px; font-weight: 600; }
    .activated-sub { font-size: 12px; color: var(--subtext); }

    /* Danger zone */
    .btn-logout {
      width: 100%;
      padding: 13px;
      border-radius: 14px;
      border: none;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      background: rgba(239,68,68,0.08);
      color: var(--danger);
      transition: background .18s, transform .15s;
    }
    .btn-logout:hover { background: rgba(239,68,68,0.14); }
    .btn-logout:active { transform: scale(0.97); }

    /* Version footer */
    .footer {
      text-align: center;
      font-size: 11px;
      color: rgba(100,116,139,0.5);
      padding-top: 8px;
      animation: fadeUp .5s ease both;
      animation-delay: .3s;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* Stagger delays */
    .card:nth-child(1) { animation-delay: .05s; }
    .card:nth-child(2) { animation-delay: .10s; }
    .card:nth-child(3) { animation-delay: .15s; }
    .card:nth-child(4) { animation-delay: .20s; }
    .section-label:nth-of-type(1) { animation-delay: .04s; }
    .section-label:nth-of-type(2) { animation-delay: .09s; }
    .section-label:nth-of-type(3) { animation-delay: .14s; }
    .section-label:nth-of-type(4) { animation-delay: .19s; }
  </style>
</head>
<body>

  <div class="header">
    <button class="back-btn" onclick="history.back()">←</button>
    <span class="header-title">设置</span>
  </div>

  <div class="page">

    <!-- 头像区域 -->
    <div class="avatar-hero">
      <div class="avatar-ring" id="avatarButton" role="button" tabindex="0" title="点击上传头像">
        <div class="avatar-inner" id="avatarEl">…</div>
      </div>
      <div class="hero-name" id="heroName">加载中</div>
      <div class="hero-badge free" id="heroBadge">普通用户</div>

      <input type="file" id="avatarInput" accept="image/*" style="display:none">

    <!-- 账号 -->
    <div class="section-label">账号</div>
    <div class="card">
      <div class="row">
        <div class="row-left">
          <div class="row-icon" style="background:rgba(34,211,238,0.1)">✉️</div>
          <div class="row-label">邮箱</div>
        </div>
        <div class="row-value" id="userEmail">--</div>
      </div>
      <div class="row">
        <div class="row-left">
          <div class="row-icon" style="background:rgba(99,102,241,0.1)">🪪</div>
          <div class="row-label">用户 ID<small>你的唯一标识</small></div>
        </div>
        <div class="row-value" id="userId" style="font-size:11px;font-family:monospace;">--</div>
      </div>
    </div>

    <!-- 使用情况 -->
    <div class="section-label">今日使用</div>
    <div class="card">
      <div class="usage-wrap">
        <div class="usage-top">
          <div class="usage-left">
            <div class="row-icon" style="background:rgba(34,211,238,0.1)">📊</div>
            <span class="usage-label">剩余次数</span>
          </div>
          <span class="usage-count" id="usageCount">--</span>
        </div>
        <div class="usage-bar-bg">
          <div class="usage-bar-fill" id="usageBar"></div>
        </div>
        <div class="usage-hint" id="usageHint">每天重置 20 次免费额度</div>
      </div>
    </div>

    <!-- Pro -->
    <div class="section-label">会员</div>
    <div class="card pro-card" id="proCard">
      <div class="pro-inner">
        <div class="pro-header">
          <div class="pro-gem">💎</div>
          <div>
            <div class="pro-title">霜蓝 Pro</div>
            <div class="pro-sub">一次付费，永久解锁</div>
          </div>
        </div>
        <div class="pro-features">
          <div class="pro-feat">无限次对话</div>
          <div class="pro-feat">深度思考模式</div>
          <div class="pro-feat">优先响应速度</div>
          <div class="pro-feat">永久有效</div>
        </div>
        <button class="btn-pro" onclick="upgrade()">立即升级 · ¥10 永久</button>
      </div>
    </div>

    <!-- 危险区 -->
    <div class="section-label">其他</div>
    <div class="card">
      <div style="padding:16px;">
        <button class="btn-logout" onclick="logout()">退出登录</button>
      </div>
    </div>

    <div class="footer">霜蓝 AI · v1.0 &nbsp;·&nbsp; 数据安全存储于云端</div>

  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
  <script>
    window._supabaseClient = window._supabaseClient || window.supabase.createClient(
      "https://klyrasrqgxijwrxuoevj.supabase.co",
      "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtseXJhc3JxZ3hpandyeHVvZXZqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NTI4ODUyMzcsImV4cCI6MjA2ODQ2MTIzN30.qjeTrLp_QquSwvF09HrrQd-stPtgu6H51-Zdb4JUeSM"
    );
    var supabase = window._supabaseClient;
    const PROFILE_META_ID = "__xixi_user_profile__";
    const PROFILE_CACHE_PREFIX = "xixi_profile_";
    const AVATAR_BUCKET = "avatars";

    function decodeJwtPayload(token) {
      const payload = token.split(".")[1];
      if (!payload) return null;
      const base64 = payload.replace(/-/g, "+").replace(/_/g, "/");
      const padded = base64.padEnd(base64.length + (4 - base64.length % 4) % 4, "=");
      return JSON.parse(decodeURIComponent(escape(atob(padded))));
    }

    // ===== 从 token 读取 user（和主页逻辑一致）=====
    function getUserFromToken() {
      const token = localStorage.getItem("token");
      const userStr = localStorage.getItem("user");
      if (userStr) {
        try { return JSON.parse(userStr); } catch {}
      }
      if (token) {
        try {
          const payload = decodeJwtPayload(token);
          return {
            id: payload.sub || payload.id || payload.user_id || payload.email || "unknown",
            email: payload.email || payload.user_email || "未知用户"
          };
        } catch {}
      }
      return null;
    }

    function getProfileCacheKey(userId) {
      return PROFILE_CACHE_PREFIX + userId;
    }

    function getCachedProfile(userId) {
      if (!userId) return null;
      try {
        return JSON.parse(localStorage.getItem(getProfileCacheKey(userId)) || "null");
      } catch {
        return null;
      }
    }

    function cacheProfile(userId, profile) {
      if (!userId || !profile) return;
      localStorage.setItem(getProfileCacheKey(userId), JSON.stringify(profile));
    }

    function setAvatarImage(url, fallbackLetter) {
      const avatarEl = document.getElementById("avatarEl");
      avatarEl.innerHTML = "";

      if (url) {
        const img = document.createElement("img");
        img.src = url;
        img.alt = "avatar";
        avatarEl.appendChild(img);
        return;
      }

      avatarEl.innerText = fallbackLetter || "?";
    }

    function syncLocalUserProfile(profile) {
      if (!profile?.avatar_url) return;
      try {
        const user = JSON.parse(localStorage.getItem("user") || "{}");
        user.avatar_url = profile.avatar_url;
        user.avatar_path = profile.avatar_path || user.avatar_path || "";
        localStorage.setItem("user", JSON.stringify(user));
      } catch {}
    }

    function extractProfile(data) {
      const rows = Array.isArray(data) ? data : [];
      return rows.find(item => item?.id === PROFILE_META_ID && item?.type === "profile")?.profile || null;
    }

    async function loadCloudProfile(userId) {
      if (!userId) return null;
      const { data, error } = await supabase
        .from("conversations")
        .select("data")
        .eq("user_id", userId)
        .maybeSingle();

      if (error) throw error;
      return extractProfile(data?.data);
    }

    async function saveProfileToCloud(user, profile) {
      const { data, error } = await supabase
        .from("conversations")
        .select("data")
        .eq("user_id", user.id)
        .maybeSingle();

      if (error) throw error;

      const rows = Array.isArray(data?.data) ? data.data : [];
      const nextRows = rows.filter(item => item?.id !== PROFILE_META_ID);
      nextRows.unshift({
        id: PROFILE_META_ID,
        type: "profile",
        profile: {
          ...profile,
          user_id: user.id,
          email: user.email || "",
          updated_at: new Date().toISOString()
        }
      });

      const { error: saveError } = await supabase
        .from("conversations")
        .upsert({
          user_id: user.id,
          data: nextRows
        }, {
          onConflict: "user_id"
        });

      if (saveError) throw saveError;
    }

    function loadImage(file) {
      return new Promise((resolve, reject) => {
        const img = new Image();
        img.onload = () => resolve(img);
        img.onerror = reject;
        img.src = URL.createObjectURL(file);
      });
    }

    async function compressAvatar(file) {
      const img = await loadImage(file);
      const size = 384;
      const canvas = document.createElement("canvas");
      canvas.width = size;
      canvas.height = size;
      const ctx = canvas.getContext("2d");
      const minSide = Math.min(img.width, img.height);
      const sx = (img.width - minSide) / 2;
      const sy = (img.height - minSide) / 2;
      ctx.drawImage(img, sx, sy, minSide, minSide, 0, 0, size, size);

      return new Promise((resolve) => {
        canvas.toBlob((blob) => {
          resolve(blob || file);
        }, "image/jpeg", 0.82);
      });
    }

    function blobToDataUrl(blob) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = () => resolve(reader.result);
        reader.onerror = reject;
        reader.readAsDataURL(blob);
      });
    }

    async function uploadAvatar(user, file) {
      const avatarBlob = await compressAvatar(file);
      const path = `${user.id}/avatar-${Date.now()}.jpg`;

      try {
        const { error } = await supabase.storage
          .from(AVATAR_BUCKET)
          .upload(path, avatarBlob, {
            contentType: "image/jpeg",
            upsert: true
          });

        if (error) throw error;

        const { data } = supabase.storage.from(AVATAR_BUCKET).getPublicUrl(path);
        if (data?.publicUrl) {
          return {
            avatar_url: `${data.publicUrl}?t=${Date.now()}`,
            avatar_path: path
          };
        }
      } catch (e) {
        console.warn("Storage 头像上传失败，改用资料同步保存:", e);
      }

      return {
        avatar_url: await blobToDataUrl(avatarBlob),
        avatar_path: ""
      };
    }

    async function handleAvatarUpload(user, file) {
      const statusEl = document.getElementById("avatarStatus");
      const ringEl = document.getElementById("avatarButton");

      if (!file) return;
      if (!file.type.startsWith("image/")) {
        statusEl.innerText = "请选择图片文件";
        return;
      }
      if (file.size > 8 * 1024 * 1024) {
        statusEl.innerText = "图片太大，请选择 8MB 内的图片";
        return;
      }

      try {
        statusEl.innerText = "正在上传头像...";
        ringEl.classList.add("uploading");

        const profile = await uploadAvatar(user, file);
        setAvatarImage(profile.avatar_url, (user.email || "?")[0].toUpperCase());
        await saveProfileToCloud(user, profile);
        cacheProfile(user.id, profile);
        syncLocalUserProfile(profile);
        statusEl.innerText = "头像已保存";
        setTimeout(() => { statusEl.innerText = ""; }, 2200);
      } catch (e) {
        console.error("头像保存失败:", e);
        statusEl.innerText = "头像保存失败，请稍后再试";
      } finally {
        ringEl.classList.remove("uploading");
      }
    }

    function setupAvatarUpload(user) {
      const button = document.getElementById("avatarButton");
      const input = document.getElementById("avatarInput");
      if (!button || !input) return;

      button.onclick = () => {
        if (!user) return;
        input.click();
      };
      // 额外保险：点击内部元素也能触发
      button.addEventListener("click", () => {
        if (!user) return;
        input.click();
      });
      button.onkeydown = (e) => {
        if ((e.key === "Enter" || e.key === " ") && user) {
          e.preventDefault();
          input.click();
        }
      };
      input.onchange = () => {
        handleAvatarUpload(user, input.files?.[0]);
        input.value = "";
      };
      // 防止某些浏览器不触发 change
      input.addEventListener("input", () => {
        handleAvatarUpload(user, input.files?.[0]);
      });
    }

    function setUsageBar(remain, total = 20) {
      const pct = Math.min(100, Math.round((remain / total) * 100));
      document.getElementById("usageBar").style.width = pct + "%";
      document.getElementById("usageCount").innerText = remain + " 次";
    }

    function renderActivated() {
      // 头像徽章
      const badge = document.getElementById("heroBadge");
      badge.innerText = "💎 Pro 会员";
      badge.className = "hero-badge pro";

      // 使用情况
      document.getElementById("usageCount").innerText = "∞";
      document.getElementById("usageBar").style.width = "100%";
      document.getElementById("usageBar").style.background = "linear-gradient(90deg,#22d3ee,#a78bfa)";
      document.getElementById("usageHint").innerText = "Pro 会员 · 无限次对话";

      // Pro 卡片变已激活样式
      const proCard = document.getElementById("proCard");
      proCard.classList.add("activated");
      proCard.innerHTML = `
        <div class="activated-banner">
          <div class="activated-icon">🎉</div>
          <div>
            <div class="activated-text">已是 Pro 会员</div>
            <div class="activated-sub">深度思考与无限对话已解锁</div>
          </div>
        </div>
      `;
    }

    async function init() {
      const user = getUserFromToken();

      if (!user) {
        document.getElementById("userEmail").innerText = "未登录";
        document.getElementById("heroName").innerText = "未登录";
        document.getElementById("userId").innerText = "--";
        document.getElementById("usageCount").innerText = "--";
        document.getElementById("usageBar").style.width = "0%";
        setupAvatarUpload(null);
        return;
      }

      // 基础信息
      const email = user.email || "未知";
      const letter = (email[0] || "?").toUpperCase();

      document.getElementById("userEmail").innerText = email;
      const userIdEl = document.getElementById("userId");
      // 优先显示 id，否则用 email 做 fallback
      userIdEl.innerText = user.id
        ? user.id
        : (user.email ? user.email.split("@")[0] : "--");
      document.getElementById("heroName").innerText = email;
      setupAvatarUpload(user);

      const cachedProfile = getCachedProfile(user.id);
      const avatarUrl = cachedProfile?.avatar_url || user.avatar_url || user.picture;
      setAvatarImage(avatarUrl, letter);

      try {
        const cloudProfile = await loadCloudProfile(user.id);
        if (cloudProfile?.avatar_url) {
          cacheProfile(user.id, cloudProfile);
          syncLocalUserProfile(cloudProfile);
          setAvatarImage(cloudProfile.avatar_url, letter);
        }
      } catch (e) {
        console.warn("头像资料读取失败:", e);
      }

      // 激活状态
      try {
        const { data: actData } = await supabase
          .from("activation_codes")
          .select("code")
          .eq("used_by", user.id)
          .maybeSingle();

        if (actData) {
          renderActivated();
          return;
        }
      } catch (e) { console.warn("激活状态查询失败:", e); }

      // 普通用户：查次数，增强 fallback
      try {
        let used = 0;

        try {
          const { data } = await supabase
            .from("usage")
            .select("count")
            .eq("user_id", user.id)
            .maybeSingle();

          used = data?.count || 0;
        } catch (e) {
          console.warn("usage表失败，fallback:", e);

          const { data: logs } = await supabase
            .from("request_logs")
            .select("created_at")
            .eq("user_id", user.id);

          const today = new Date().toDateString();
          used = (logs || []).filter(l =>
            new Date(l.created_at).toDateString() === today
          ).length;
        }

        const remain = Math.max(0, 20 - used);
        setUsageBar(remain);
      } catch (e) {
        console.warn("使用次数查询失败:", e);
        document.getElementById("usageCount").innerText = "--";
      }
    }

    function upgrade() {
      window.location.href = "ai.html#upgrade";
    }

    function logout() {
      if (!confirm("确定退出登录？")) return;
      localStorage.removeItem("token");
      localStorage.removeItem("user");
      location.href = "ai.html";
    }
// ===== 夜间模式同步 + 自动模式 =====
(function syncTheme() {
  function applyTheme() {
    let theme = localStorage.getItem("theme");

    // 如果用户没有手动设置，则按时间自动
    if (!theme) {
      const hour = new Date().getHours();
      theme = (hour >= 18 || hour < 6) ? "dark" : "light";
    }

    document.body.classList.toggle("dark", theme === "dark");
  }

  // 初始执行
  applyTheme();

  // 跨页面同步
  window.addEventListener("storage", (e) => {
    if (e.key === "theme") {
      applyTheme();
    }
  });

  // 每5分钟检查一次时间（避免跨6点不刷新）
  setInterval(applyTheme, 5 * 60 * 1000);
})();
    init();
  </script>
