

<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>验证中</title>
  <script src="https://challenges.cloudflare.com/turnstile/v0/api.js" async defer></script>
  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0f172a;
      color: white;
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
    }
    .box {
      text-align: center;
      padding: 24px;
      border-radius: 16px;
      background: rgba(255,255,255,0.05);
      backdrop-filter: blur(10px);
    }
    h2 {
      margin-bottom: 16px;
      font-weight: 500;
    }
  </style>
</head>
<body>
  <div class="box">
    <h2>正在进行安全验证...</h2>
    <div
      class="cf-turnstile"
      data-sitekey="0x4AAAAAAC_W2Wj2YdkrQiMf"
      data-callback="onSuccess">
    </div>
  </div>

  <script>
    function onSuccess(token) {
      // Flutter WebView 通信（推荐）
      if (window.flutter_inappwebview) {
        window.flutter_inappwebview.callHandler('captcha', token);
      }

      // 备用：URL 方式（也可以用）
      setTimeout(() => {
        window.location.href = "sunland://captcha?token=" + token;
      }, 300);
    }
  </script>
</body>
</html>
