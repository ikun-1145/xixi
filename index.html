  <style>
    /* ===== 页面布局 ===== */
    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      transition: opacity var(--dur-base) ease;
    }

    /* 顶部极浅的品牌色晕染（静态，无动画） */
    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background: radial-gradient(640px 320px at 50% -120px, var(--brand-soft), transparent 70%);
      pointer-events: none;
      z-index: -1;
    }

    /* ===== 主容器 ===== */
    .container {
      width: calc(100% - var(--space-8));
      max-width: 680px;
      margin: var(--space-16) auto 0;
      padding: var(--space-12) var(--space-8);
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--r-xl);
      box-shadow: var(--shadow-md);
      text-align: center;

      /* 初始隐藏，等待 splash 结束 */
      opacity: 0;
      transform: translateY(8px);
      transition: opacity var(--dur-slow) var(--ease),
                  transform var(--dur-slow) var(--ease);
    }

    body.ready .container {
      opacity: 1;
      transform: none;
    }

    /* ===== 头像 ===== */
    .avatar {
      width: 112px;
      height: 112px;
      border-radius: 50%;
      object-fit: cover;
      border: 3px solid var(--surface);
      box-shadow: 0 0 0 1px var(--border-strong), var(--shadow-md);
      margin-bottom: var(--space-4);
      cursor: pointer;
    }

    /* ===== 问候语（打字机） ===== */
    #greeting {
      display: block;
      margin: var(--space-2) auto var(--space-1);
      font-size: var(--title-lg);
      font-weight: 700;
      letter-spacing: -0.01em;
      white-space: nowrap;
      min-height: 1.3em;
      border-right: 2px solid var(--brand);
      animation: caret-blink 0.9s step-end infinite;
    }

    @keyframes caret-blink {
      from, to { border-color: transparent; }
      50%      { border-color: var(--brand); }
    }

    #greeting.finished {
      border-right: none;
      animation: none;
    }

    .intro {
      margin: 0 auto;
      max-width: 44ch;
      font-size: var(--text-base);
      color: var(--text-2);
    }

    /* ===== 导航网格 ===== */
    .buttons {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: var(--space-3);
      margin-top: var(--space-8);
    }

    @media (min-width: 560px) {
      .buttons { grid-template-columns: repeat(4, 1fr); }
    }

    .buttons a {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 56px;
      padding: var(--space-3) var(--space-2);
      border: 1px solid var(--border-strong);
      border-radius: var(--r-md);
      color: var(--text);
      font-size: var(--text-sm);
      font-weight: 600;
      text-decoration: none;
      transition: border-color var(--dur-fast) var(--ease),
                  color var(--dur-fast) var(--ease),
                  transform var(--dur-fast) var(--ease),
                  box-shadow var(--dur-fast) var(--ease);
    }

    .buttons a:hover {
      border-color: var(--brand);
      color: var(--brand-strong);
      transform: translateY(-1px);
      box-shadow: var(--shadow-sm);
    }

    /* ===== 捐赠区（页面唯一品牌色 CTA） ===== */
    .donate-section {
      margin-top: var(--space-8);
      padding-top: var(--space-6);
      border-top: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: var(--space-3);
    }

    .donate-caption {
      font-size: var(--text-sm);
      color: var(--text-3);
    }

    #donateBtn { min-width: 200px; }

    /* ===== 登录弹窗内容 ===== */
    .modal-content h2 {
      font-size: var(--title-sm);
      margin: 0 0 var(--space-6);
    }

    .oauth-btn {
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      height: 46px;
      border-radius: var(--r-md);
      background: var(--surface);
      border: 1px solid var(--border-strong);
      color: var(--text);
      font-family: inherit;
      font-size: var(--text-sm);
      font-weight: 600;
      cursor: pointer;
      transition: border-color var(--dur-fast) var(--ease),
                  transform var(--dur-fast) var(--ease),
                  box-shadow var(--dur-fast) var(--ease);
    }

    .oauth-btn:hover {
      border-color: var(--brand);
      transform: translateY(-1px);
      box-shadow: var(--shadow-sm);
    }

    .oauth-btn + .oauth-btn { margin-top: var(--space-3); }

    .oauth-btn img {
      width: 20px;
      height: 20px;
    }

    /* ===== Splash ===== */
    #loading {
      position: fixed;
      inset: 0;
      z-index: 9999;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--bg);
      transition: opacity var(--dur-slow) ease, visibility var(--dur-slow) ease;
    }

    #loading.fade {
      opacity: 0;
      visibility: hidden;
    }

    .loading-inner {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: var(--space-4);
    }

    #loadingText {
      font-size: var(--text-sm);
      color: var(--text-3);
    }

    /* ===== AI 入口 ===== */
    .ai-entry-group {
      cursor: grab;
      user-select: none;
      -webkit-user-select: none;
    }

    .ai-entry-group.dragging {
      cursor: grabbing;
      transition: none !important;
    }

    .ai-entry {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 16px 8px 8px;
      border-radius: var(--r-full);
      background: var(--glass-bg);
      border: 1px solid var(--border);
      -webkit-backdrop-filter: blur(12px);
      backdrop-filter: blur(12px);
      box-shadow: var(--shadow-md);
      cursor: pointer;
      transition: transform var(--dur-fast) var(--ease),
                  box-shadow var(--dur-fast) var(--ease),
                  border-color var(--dur-fast) var(--ease);
    }

    .ai-entry:hover {
      transform: translateY(-2px);
      border-color: var(--brand);
      box-shadow: var(--shadow-md);
    }

    .ai-entry-icon {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: var(--brand-soft);
      display: flex;
      align-items: center;
      justify-content: center;
      flex: none;
    }

    .ai-entry-icon img {
      width: 20px;
      height: 20px;
      object-fit: contain;
    }

    .ai-entry-text {
      display: flex;
      flex-direction: column;
      line-height: 1.3;
      text-align: left;
    }

    .ai-entry-title {
      font-size: var(--text-sm);
      font-weight: 600;
      color: var(--text);
    }

    .ai-entry-desc {
      font-size: 11px;
      color: var(--text-3);
    }

    @supports not ((backdrop-filter: blur(1px)) or (-webkit-backdrop-filter: blur(1px))) {
      .ai-entry { background: var(--surface); }
    }

    /* ===== AI 进入过渡 ===== */
    body.ai-leaving { overflow: hidden; }

    body.ai-leaving .container {
      animation: aiZoomOut 0.5s var(--ease) forwards;
    }

    body.ai-leaving::after {
      content: "";
      position: fixed;
      inset: 0;
      background: var(--scrim);
      opacity: 0;
      animation: aiFade 0.5s ease forwards;
      z-index: 999;
    }

    @keyframes aiZoomOut {
      to { opacity: 0; transform: translateY(-6px) scale(0.98); }
    }

    @keyframes aiFade {
      to { opacity: 1; }
    }

    /* ===== Easter Egg 溶解动画（彩蛋叙事，保留原样） ===== */
    @keyframes dissolveOut {
      0% {
        opacity: 1;
        filter: blur(0px) contrast(1) hue-rotate(0deg);
        transform: scale(1) rotate(0deg);
      }
      20% { filter: blur(6px) contrast(1.3) hue-rotate(10deg); }
      35% {
        filter: blur(14px) contrast(1.6) hue-rotate(-15deg);
        transform: scale(1.02) rotate(0.5deg);
      }
      55% {
        opacity: 0.85;
        filter: blur(26px) contrast(1.9) hue-rotate(25deg);
        transform: scale(1.05) rotate(-0.8deg);
      }
      75% {
        opacity: 0.55;
        filter: blur(40px) contrast(2.3) hue-rotate(-40deg);
        transform: scale(1.1) rotate(1.2deg);
      }
      100% {
        opacity: 0;
        filter: blur(65px) contrast(3) hue-rotate(90deg);
        transform: scale(1.25) rotate(-2deg);
      }
    }

    @keyframes glitchFlash {
      0%, 100% { opacity: 0; }
      10% { opacity: 0.15; }
      20% { opacity: 0; }
      30% { opacity: 0.2; }
      40% { opacity: 0; }
      55% { opacity: 0.25; }
      70% { opacity: 0; }
    }

    body.egg-dissolve {
      animation: dissolveOut 2.4s cubic-bezier(.4,0,.2,1) forwards;
      position: relative;
      overflow: hidden;
    }

    body.egg-dissolve::after {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background:
        repeating-linear-gradient(
          0deg,
          rgba(113,248,252,0.08) 0px,
          rgba(113,248,252,0.08) 2px,
          transparent 2px,
          transparent 6px
        );
      mix-blend-mode: overlay;
      animation: glitchFlash 2.4s linear forwards;
    }

    body.egg-dissolve::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background: radial-gradient(circle at center,
        rgba(255,255,255,0.8) 0%,
        rgba(255,255,255,0.4) 20%,
        rgba(255,255,255,0.1) 40%,
        transparent 70%
      );
      opacity: 0;
      animation: whiteFlash 2.4s ease forwards;
      z-index: 1;
    }

    @keyframes whiteFlash {
      0% { opacity: 0; }
      15% { opacity: 0.9; }
      30% { opacity: 0.2; }
      100% { opacity: 0; }
    }

    .avatar.egg-burst {
      animation: avatarBurst 2.4s ease forwards;
    }

    @keyframes avatarBurst {
      0% { filter: brightness(1); }
      40% { filter: brightness(2.5) saturate(1.6); }
      70% { filter: brightness(3.2) saturate(2); }
      100% { filter: brightness(0); opacity: 0; }
    }

    /* ===== 移动端 ===== */
    @media (max-width: 480px) {
      .container {
        width: calc(100% - var(--space-6));
        margin-top: var(--space-12);
        padding: var(--space-8) var(--space-4);
      }

      .avatar {
        width: 96px;
        height: 96px;
      }

      .ai-entry-desc { display: none; }
    }
  </style>
</head>

  <script type="module">
    import { supabase } from './p/js/supabaseClient.js';

    function applyAutoTheme() {
      const hour = new Date().getHours();
      const isNight = hour >= 18 || hour < 6; // 18:00–06:00
      document.body.classList.toggle('night', isNight);
    }

    // 初始化主题
    applyAutoTheme();
    // 每10分钟检查一次主题
    setInterval(applyAutoTheme, 10 * 60 * 1000);

    let sessionCache = null;

    async function syncSession() {
      const { data } = await supabase.auth.getSession();
      sessionCache = data.session;
      return sessionCache;
    }

    // 根据 session 刷新“捐赠支持”按钮视觉反馈
    function updateDonateButtonBySession(session) {
      const donateBtn = document.getElementById("donateBtn");
      const donateText = document.getElementById("btnDonate");

      if (!donateBtn || !donateText) return;

      donateBtn.disabled = false;
      donateBtn.style.opacity = "1";
      donateBtn.style.cursor = "pointer";
      donateText.textContent = "捐赠支持";
    }

    document.addEventListener('DOMContentLoaded', async () => {
      // 🔥 进入页面立即关闭全局 loading（防止跨页面残留）
      hideGlobalLoading();
      // 如果用户刚刚在 donate 页面主动退出，禁止 Supabase 自动恢复 session
      if (sessionStorage.getItem("forceLoggedOut") === "1") {
        try {
          await supabase.auth.signOut({ scope: 'local' });
        } catch (e) {}
        sessionStorage.removeItem("forceLoggedOut");
      }
      try {
        await syncSession();
        updateDonateButtonBySession(sessionCache);
        // 登录后跳转逻辑
        const from = sessionStorage.getItem("loginFrom");
        const returnTo = sessionStorage.getItem("returnTo");

        if (sessionCache && returnTo === "ai") {
          sessionStorage.removeItem("returnTo");
          location.href = "ai.html";
        }

        if (sessionCache && from === "index") {
          sessionStorage.removeItem("loginFrom");

          setTimeout(() => {
            document.body.style.opacity = '0';
            setTimeout(() => location.href = "donate.html", 250);
          }, 300);
        }
      } catch(e){
        console.warn('Supabase 加载失败:', e);
      }

      // 页面首次加载时确保不显示登录弹窗
      document.getElementById("loginModal").classList.remove("active");
      // 语言切换渐现
      requestAnimationFrame(() => {
        document.querySelector('.lang-switcher')?.classList.add('show');
      });
    });

    function closeModal(){
      const modal = document.getElementById("loginModal");
      modal.classList.add("closing");

      setTimeout(() => {
        modal.classList.remove("active");
        modal.classList.remove("closing");
      }, 240);
    }

    // ESC 键关闭模态框
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') {
        closeModal();
      }
    });

    document.querySelector(".close").onclick = closeModal;
    document.getElementById("loginModal").onclick = (e)=>{
      if(e.target===e.currentTarget) closeModal();
    };

    document.getElementById("donateBtn").onclick = async () => {
      await syncSession();
      updateDonateButtonBySession(sessionCache);

      if (sessionCache) {
        // 标记为站内跳转，返回首页时不重播 Splash
        sessionStorage.setItem("skipSplash", "1");

        document.body.style.opacity = '0';
        setTimeout(() => location.href = "donate.html", 250);
      } else {
        document.getElementById("loginModal").classList.add("active");
      }
    };

    document.getElementById("githubLoginBtn").onclick = async () => {
      sessionStorage.setItem("loginFrom", "index");
      await supabase.auth.signInWithOAuth({
        provider:'github',
        options:{ redirectTo: location.origin + '/oauth-callback.html' }
      });
    };

    document.getElementById("googleLoginBtn").onclick = async () => {
      sessionStorage.setItem("loginFrom", "index");
      await supabase.auth.signInWithOAuth({
        provider:'google',
        options:{ redirectTo: location.origin + '/oauth-callback.html' }
      });
    };

    /* ===== 稳定版 Splash 控制（支持返回不重播） ===== */

    // 站内跳转时标记，返回首页不重播 Splash
    document.querySelectorAll('.buttons a').forEach(link => {
      link.addEventListener('click', () => {
        sessionStorage.setItem("skipSplash", "1");
      });
    });

    const navEntry = performance.getEntriesByType("navigation")[0];

    // 站内跳转返回控制（避免重播 Splash）
    const skipSplashBySession = sessionStorage.getItem("skipSplash") === "1";
    if (skipSplashBySession) {
      sessionStorage.removeItem("skipSplash");
    }

    const isBackForward =
      (navEntry && navEntry.type === "back_forward") || skipSplashBySession;

    // Safari BFCache 处理
    window.addEventListener("pageshow", (event) => {
      if (event.persisted || isBackForward) {
        const splash = document.getElementById("loading");
        if (splash) splash.remove();
        document.body.classList.add("ready");
        document.dispatchEvent(new Event("app-ready"));
      }
    });

    window.addEventListener('load', () => {
      if (isBackForward) return;

      const splash = document.getElementById('loading');

      if (!splash) {
        document.body.classList.add('ready');
        document.dispatchEvent(new Event('app-ready'));
        return;
      }

      let finished = false;

      function finishSplash() {
        if (finished) return;
        finished = true;

        splash.classList.add('fade');

        setTimeout(() => {
          splash.remove();
          document.body.classList.add('ready');
          document.dispatchEvent(new Event('app-ready'));
        }, 400);
      }

      // 固定时间结束（更稳定）
      setTimeout(finishSplash, 900);
    });
</script>

      game: "ミニゲーム",
      plan: "留学計画",
      donate: "支援する",
      loading: "読み込み中...",
      firstVisitTip: "初回読み込みには時間がかかる場合があります。しばらくお待ちください。",
    }
  };

  function applyLang(lang) {
    const t = i18n[lang];

    // 更新加载文本
    const loadingText = document.getElementById("loadingText");
    if (loadingText) {
      loadingText.textContent = t.loading;
    }
    const firstVisitTipEl = document.getElementById("firstVisitTip");
    if (firstVisitTipEl) {
      firstVisitTipEl.textContent = t.firstVisitTip;
    }

    document.getElementById("introText").textContent = t.intro;
    document.getElementById("btnShoushe").textContent = t.shoushe;
    document.getElementById("btnBanquan").textContent = t.banquan;
    document.getElementById("btnGuanzhu").textContent = t.guanzhu;
    document.getElementById("btnLianxi").textContent = t.lianxi;
    document.getElementById("btnComment").textContent = t.comment;
    document.getElementById("btnFans").textContent = t.fans;
    document.getElementById("btnGame").textContent = t.game;
    document.getElementById("btnPlan").textContent = t.plan;
    document.getElementById("btnDonate").textContent = t.donate;

    /* ===== 打字动画（防并发修复版）===== */

    const greetingEl = document.getElementById("greeting");
    greetingEl.classList.remove("finished");
    greetingEl.textContent = "";

    const text = t.greeting;
    let i = 0;

    // 为本次动画生成唯一标识
    const myToken = ++typingToken;

    function typeNext() {
      // 如果已经被新的语言切换打断，直接终止
      if (myToken !== typingToken) return;

      if (i < text.length) {
        greetingEl.textContent += text.charAt(i);
        i++;
        setTimeout(typeNext, i === 1 ? 520 : 320);
      } else {
        setTimeout(() => {
          if (myToken === typingToken) {
            greetingEl.classList.add("finished");
          }
        }, 900);
      }
    }

    setTimeout(typeNext, 300);
  }

  /* ===== Easter Egg：连续点击头像7次进入 egg.html ===== */
  document.addEventListener("DOMContentLoaded", () => {
    const avatar = document.querySelector(".avatar");
    if (!avatar) return;

    let clickCount = 0;
    let clickTimer = null;

    avatar.addEventListener("click", () => {
      clickCount++;

      if (clickTimer) clearTimeout(clickTimer);
      clickTimer = setTimeout(() => {
        clickCount = 0;
      }, 1500);

      if (clickCount >= 7) {
        clickCount = 0;

        // ===== 写入彩蛋访问凭证 =====
        const token = Math.random().toString(36).slice(2, 18);
        sessionStorage.setItem("eggAccess", "1");
        sessionStorage.setItem("eggTime", Date.now().toString());
        sessionStorage.setItem("eggToken", token);

        // 触发溶解动画
        document.body.classList.add("egg-dissolve");
        avatar.classList.add("egg-burst");

        // 动画结束后跳转
        setTimeout(() => {
          location.href = "egg.html";
        }, 2400);
      }
    });
  });

  document.addEventListener("app-ready", () => {
    // 浏览器语言检测（增强版）
    const rawLang = navigator.language || navigator.userLanguage || "en";
    const browserLang = rawLang.toLowerCase();

    let autoLang = "en"; // 默认回退英语

    if (browserLang.startsWith("zh")) {
      autoLang = "zh";
    } else if (browserLang.startsWith("ja")) {
      autoLang = "ja";
    } else if (browserLang.startsWith("en")) {
      autoLang = "en";
    } else {
      autoLang = "en"; // 其他语言统一回退到英语
    }

    const saved = localStorage.getItem("lang");
    const finalLang = saved || autoLang;

    applyLang(finalLang);

    document.querySelectorAll("#langSwitcher button").forEach(btn => {
      btn.classList.toggle("active", btn.dataset.lang === finalLang);
      btn.onclick = () => {
        const lang = btn.dataset.lang;
        localStorage.setItem("lang", lang);
        document.querySelectorAll("#langSwitcher button")
          .forEach(b => b.classList.remove("active"));
        btn.classList.add("active");
        applyLang(lang);
      };
    });
  });
  </script>

<script>
  /* ===== AI入口拖拽 + 吸边 ===== */
(function(){
  const el = document.querySelector('.ai-entry-group');
  if (!el) return;

  let isDown = false;
  let offsetX = 0;
  let offsetY = 0;

  el.addEventListener('mousedown', (e) => {
    isDown = true;
    el.classList.add('dragging');

    const rect = el.getBoundingClientRect();
    offsetX = e.clientX - rect.left;
    offsetY = e.clientY - rect.top;
  });

  document.addEventListener('mousemove', (e) => {
    if (!isDown) return;

    let x = e.clientX - offsetX;
    let y = e.clientY - offsetY;

    const maxX = window.innerWidth - el.offsetWidth;
    const maxY = window.innerHeight - el.offsetHeight;

    x = Math.max(0, Math.min(x, maxX));
    y = Math.max(0, Math.min(y, maxY));

    el.style.left = x + 'px';
    el.style.top = y + 'px';
    el.style.right = 'auto';
    el.style.bottom = 'auto';
  });

  document.addEventListener('mouseup', () => {
    if (!isDown) return;
    isDown = false;
    el.classList.remove('dragging');

    // 吸边
    const rect = el.getBoundingClientRect();
    const mid = window.innerWidth / 2;

    if (rect.left + rect.width / 2 < mid) {
      el.style.left = '10px';
    } else {
      el.style.left = (window.innerWidth - rect.width - 10) + 'px';
    }
  });

  // 移动端支持
  el.addEventListener('touchstart', (e) => {
    const t = e.touches[0];
    isDown = true;
    el.classList.add('dragging');

    const rect = el.getBoundingClientRect();
    offsetX = t.clientX - rect.left;
    offsetY = t.clientY - rect.top;
  });

  document.addEventListener('touchmove', (e) => {
    if (!isDown) return;
    const t = e.touches[0];

    let x = t.clientX - offsetX;
    let y = t.clientY - offsetY;

    const maxX = window.innerWidth - el.offsetWidth;
    const maxY = window.innerHeight - el.offsetHeight;

    x = Math.max(0, Math.min(x, maxX));
    y = Math.max(0, Math.min(y, maxY));

    el.style.left = x + 'px';
    el.style.top = y + 'px';
    el.style.right = 'auto';
    el.style.bottom = 'auto';
  });

  document.addEventListener('touchend', () => {
    if (!isDown) return;
    isDown = false;
    el.classList.remove('dragging');

    const rect = el.getBoundingClientRect();
    const mid = window.innerWidth / 2;

    if (rect.left + rect.width / 2 < mid) {
      el.style.left = '10px';
    } else {
      el.style.left = (window.innerWidth - rect.width - 10) + 'px';
    }
  });
})();

function showGlobalLoading() {
  const el = document.getElementById("loadingBar");
  if (el) el.classList.add("active");
}
function hideGlobalLoading() {
  const el = document.getElementById("loadingBar");
  if (el) el.classList.remove("active");
}

// 链接点击时显示 loading
document.querySelectorAll("a").forEach(a => {
  a.addEventListener("click", (e) => {
    const href = a.getAttribute("href");
    if (!href || href.startsWith("http") || href.startsWith("#")) return;
    showGlobalLoading();
  });
});
</script>

  <div class="ai-entry-group" style="position:fixed;right:20px;bottom:20px;z-index:900;">

      <div class="ai-entry-icon">

      </div>
      <div class="ai-entry-text">
        <div class="ai-entry-title">AI 助手</div>
        <div class="ai-entry-desc">对话 / 编程 / 创作</div>
      </div>
    </div>
  </div>

  <div id="loadingBar" aria-hidden="true"><span class="bar"></span></div>
</body>
