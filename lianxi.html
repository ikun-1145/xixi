<!DOCTYPE html>
<html lang="zh-Hans">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title id="pageTitle">联系我们 - 霜蓝</title>
  <meta name="theme-color" content="#f7f9fa" media="(prefers-color-scheme: light)">
  <meta name="theme-color" content="#13151e" media="(prefers-color-scheme: dark)">
  <link rel="stylesheet" href="p/css/tokens.css">
  <link rel="stylesheet" href="p/css/base.css">
  <style>
    /* preload 阶段隐藏页面 */
    body.preload { opacity: 0; }

    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      overflow-x: hidden;
    }

    .page-card {
      width: min(100% - var(--space-8), 560px);
      margin-top: var(--space-16);
      padding: var(--space-8) var(--space-6) var(--space-12);
      text-align: center;
      animation: fade-in-up var(--dur-slow) var(--ease) both;
    }

    h1 {
      font-size: var(--title-md);
      font-weight: 700;
      letter-spacing: -0.01em;
      margin-bottom: var(--space-6);
    }

    .contact-card {
      margin-top: var(--space-4);
      padding: var(--space-6) var(--space-4);
      border-radius: var(--r-md);
      border: 1px solid var(--border);
      background: var(--surface-2);
    }

    .contact-card + .contact-card { margin-top: var(--space-4); }

    .contact-label,
    .social-hint {
      font-size: var(--text-xs);
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--text-3);
      margin-bottom: var(--space-3);
    }

    .email {
      font-size: var(--text-lg);
      font-weight: 600;
      margin: var(--space-2) 0 var(--space-4);
      letter-spacing: 0.02em;
      word-break: break-all;
      font-variant-numeric: tabular-nums;
    }

    .copy-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      height: 36px;
      padding: 0 var(--space-4);
      border-radius: var(--r-md);
      border: 1px solid var(--border-strong);
      background: var(--surface);
      color: var(--text);
      font-weight: 600;
      font-size: var(--text-sm);
      cursor: pointer;
      user-select: none;
      transition: border-color var(--dur-fast) var(--ease),
                  transform var(--dur-fast) var(--ease),
                  box-shadow var(--dur-fast) var(--ease);
    }

    .copy-btn:hover {
      border-color: var(--brand);
      transform: translateY(-1px);
      box-shadow: var(--shadow-sm);
    }

    .social-grid {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: var(--space-2);
      margin-top: var(--space-4);
    }

    @media (max-width: 600px) {
      .social-grid { grid-template-columns: repeat(2, 1fr); }
    }

    .social-item {
      padding: var(--space-4) var(--space-2);
      border-radius: var(--r-md);
      background: var(--surface);
      border: 1px solid var(--border);
      cursor: pointer;
      user-select: none;
      text-decoration: none;
      color: var(--text);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: var(--space-2);
      transition: transform var(--dur-fast) var(--ease),
                  border-color var(--dur-fast) var(--ease),
                  box-shadow var(--dur-fast) var(--ease);
    }

    .social-item:hover {
      transform: translateY(-2px);
      border-color: var(--brand);
      box-shadow: var(--shadow-sm);
    }

    .social-item:active { transform: none; }

    .social-icon {
      width: 36px;
      height: 36px;
      border-radius: var(--r-sm);
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--surface-2);
      overflow: hidden;
    }

    .social-name {
      font-size: var(--text-xs);
      font-weight: 600;
      letter-spacing: 0.03em;
      color: var(--text-2);
    }

    .back { margin-top: var(--space-8); }

    @media (max-width: 480px) {
      .page-card { margin-top: var(--space-12); }
    }

    /* 页面加载指示 */
    #loading {
      position: fixed;
      inset: 0;
      z-index: 9998;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--bg);
      transition: opacity var(--dur-slow) ease;
    }

    body.fade-in { animation: fade-body var(--dur-slow) ease; }
    @keyframes fade-body { from { opacity: 0; } to { opacity: 1; } }
  </style>
</head>
<body>
  <script>
    /* 首帧前应用夜间主题，避免闪色 */
    (function () {
      var hour = new Date().getHours();
      if (hour >= 18 || hour < 6) document.body.classList.add('night');
    })();
  </script>

  <!-- 加载动画 -->
  <div id="loading" aria-label="页面加载中">
    <div class="spinner" aria-hidden="true"></div>
  </div>

  <div id="langSwitcher" class="lang-switcher" role="navigation" aria-label="语言切换">
    <button data-lang="zh">中文</button>
    <button data-lang="en">EN</button>
    <button data-lang="ja">日本語</button>
  </div>

  <main class="page-shell page-card card">
    <h1 id="titleText"></h1>
    <div class="contact-card">
      <div class="contact-label">Primary Contact</div>
      <div class="email" id="emailText">sunlandccc@outlook.com</div>
      <div class="copy-btn" id="copyBtn" role="button" tabindex="0">复制邮箱</div>
    </div>
    <div class="contact-card">
      <div class="social-hint">点击图标访问我的社交平台</div>
      <div class="social-grid">
        <a href="https://github.com/ikun-1145" target="_blank" class="social-item">
          <div class="social-icon">
            <img src="p/github.svg" alt="GitHub" style="width:22px;height:22px;">
          </div>
          <div class="social-name">GitHub</div>
        </a>

        <a href="https://space.bilibili.com/3537110472592282?spm_id_from=333.337.0.0" target="_blank" class="social-item">
          <div class="social-icon">
            <img src="p/bilibili.svg" alt="Bilibili" style="width:22px;height:22px;">
          </div>
          <div class="social-name">Bilibili</div>
        </a>

        <a href="https://www.douyin.com/user/MS4wLjABAAAAhltnZRm9HGKJhr2GANY0gEeaNgdto05Dw4fmj0VHu4w?from_tab_name=main" target="_blank" class="social-item">
          <div class="social-icon">
            <img src="p/dy.svg" alt="Douyin" style="width:22px;height:22px;">
          </div>
          <div class="social-name">抖音</div>
        </a>

        <a href="https://x.com/" target="_blank" class="social-item">
          <div class="social-icon">
            <img src="p/x.svg" alt="X" style="width:22px;height:22px;">
          </div>
          <div class="social-name">X</div>
        </a>

        <a href="https://www.xiaohongshu.com/user/profile/6724bcd9000000001c01ae54?xsec_token=ABRwvfNwkP7DMdMVvZ8SQforCoXBlVi3Un2eR7cOZ56UE%3D&xsec_source=pc_search" target="_blank" class="social-item">
          <div class="social-icon">
            <img src="p/xhs.svg" alt="小红书" style="width:22px;height:22px;">
          </div>
          <div class="social-name">小红书</div>
        </a>
      </div>
    </div>
    <a href="index.html" class="back btn btn-secondary" id="backBtn"></a>
  </main>
  <footer class="site-footer">© 2024–2026 霜蓝 · All Rights Reserved.</footer>

  <script>
    document.body.classList.add('preload');

    function applyAutoTheme() {
      const hour = new Date().getHours();
      const isNight = hour >= 18 || hour < 6;
      document.body.classList.toggle('night', isNight);
    }

    applyAutoTheme();
    setInterval(applyAutoTheme, 10 * 60 * 1000);

    const i18n = {
      zh: {
        pageTitle: "联系我们 - 霜蓝",
        title: "联系我们",
        back: "← 返回主页"
      },
      en: {
        pageTitle: "Contact - Sunland",
        title: "Contact",
        back: "← Back to Home"
      },
      ja: {
        pageTitle: "連絡先 - フロスト",
        title: "連絡先",
        back: "← ホームへ戻る"
      }
    };

    function applyLang() {
      const lang = localStorage.getItem("lang") || "zh";
      const t = i18n[lang] || i18n.zh;

      document.title = t.pageTitle;
      document.getElementById("titleText").textContent = t.title;
      document.getElementById("backBtn").textContent = t.back;

      document.querySelectorAll("#langSwitcher button").forEach(btn => {
        btn.classList.toggle("active", btn.dataset.lang === lang);
      });
    }

    document.querySelectorAll("#langSwitcher button").forEach(btn => {
      btn.onclick = () => {
        localStorage.setItem("lang", btn.dataset.lang);
        applyLang();
      };
    });

    function setupCopyButton() {
      const btn = document.getElementById("copyBtn");
      const email = document.getElementById("emailText").textContent.replace("📧 ", "");

      btn.addEventListener("click", async () => {
        try {
          await navigator.clipboard.writeText(email);
          btn.textContent = "已复制 ✓";
          setTimeout(() => btn.textContent = "复制邮箱", 1500);
        } catch (err) {
          btn.textContent = "复制失败";
        }
      });
    }

    window.addEventListener('load', () => {
      applyLang();
      setupCopyButton();

      // 页面解封
      document.body.classList.remove('preload');
      document.body.classList.add('fade-in');

      const loader = document.getElementById('loading');
      if (loader) {
        loader.style.opacity = '0';
        setTimeout(() => loader.remove(), 400);
      }
    });

    // 跳转按钮淡出过渡
    document.addEventListener("DOMContentLoaded", () => {
      const links = document.querySelectorAll("a[href]");
      links.forEach(link => {
        const href = link.getAttribute("href");
        if (!href.startsWith("#") && !href.startsWith("javascript")) {
          link.addEventListener("click", (e) => {
            e.preventDefault();
            document.body.classList.add("fade-out");
            setTimeout(() => window.location.href = href, 250);
          });
        }
      });
    });

    function showGlobalLoading() {
      const el = document.getElementById("loadingBar");
      if (el) el.classList.add("active");
    }

    function hideGlobalLoading() {
      const el = document.getElementById("loadingBar");
      if (el) el.classList.remove("active");
    }

    // 页面进入立即关闭 loading（防止跨页面残留）
    document.addEventListener("DOMContentLoaded", () => {
      hideGlobalLoading();
    });

    document.querySelectorAll("a").forEach(a => {
      a.addEventListener("click", () => {
        showGlobalLoading();
      });
    });
  </script>

  <div id="loadingBar" aria-hidden="true"><span class="bar"></span></div>
</body>
</html>
