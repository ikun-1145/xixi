<script type="module">
const chat = document.getElementById("chat");

import { supabase } from './p/js/supabaseClient.js';

let session = null;
let sessionReady = false; // ✅ 是否已完成登录检查

async function checkLogin() {
  try {
    const { data } = await supabase.auth.getSession();
    session = data.session;
    sessionReady = true;
    renderUser();
    if (session && !window.__cloudSynced) {
      window.__cloudSynced = true;
      syncFromCloud();
    }
    // 如果已登录，关闭弹窗
    if (session) {
      document.getElementById("loginModal")?.remove();
      document.body.style.overflow = "";
    }
  } catch (e) {
    console.warn("登录检测失败，已显示登录弹窗：", e);
    sessionReady = true;
  }
}
function renderUser() {
  const box = document.getElementById("userBox");
  if (!box) return;

  box.innerHTML = "";

  // 未登录
  if (!session || !session.user) {
    const btn = document.createElement("div");
    btn.className = "login-btn";
    btn.innerText = "登录";
    btn.onclick = showLoginPrompt;
    box.appendChild(btn);

  modal.innerHTML = `
<div class="modal-content">

  }

  modal.querySelector(".close").onclick = closeModal;

    if (e.target === modal) closeModal();

  // 登录逻辑（复用主页）

    sessionStorage.setItem("loginFrom", "ai");

  modal.querySelector("#googleLoginBtn").onclick = async () => {
    sessionStorage.setItem("loginFrom", "ai");

      options: { redirectTo: location.origin + '/oauth-callback.html' }
    });
  };
}

// 页面加载时检查登录
checkLogin();
setTimeout(() => {
  if (sessionReady && !session) showLoginPrompt();
}, 300);

// 监听登录状态变化（防止刷新/登录后不同步）
supabase.auth.onAuthStateChange((_event, newSession) => {

});

let controller = null;
let sendingLock = false;
let isStreaming = false;
const sendBtn = document.getElementById("sendBtn");
sendBtn.innerText = "↑";
sendBtn.onclick = send;

`
  }
];
let conversations = JSON.parse(localStorage.getItem("conversations") || "[]");
let syncTimer = null;

async function syncFromCloud() {
  if (!session || !session.user) return;

  try {
    const { data, error } = await supabase
      .from("conversations")
      .select("data")
      .eq("user_id", session.user.id)
      .maybeSingle();

    if (error) {
      console.warn("云端拉取失败:", error);
      return;
    }

    if (data && data.data) {
      const cloudConversations = data.data || [];
// ⭐兼容旧数据（没有updatedAt）
conversations.forEach(c => {
  if (!c.updatedAt) c.updatedAt = c.id;
});

cloudConversations.forEach(c => {
  if (!c.updatedAt) c.updatedAt = c.id;
});
      // ⭐ 合并本地与云端（按更新时间优先）
const map = new Map();

// 先放云端
cloudConversations.forEach(c => map.set(c.id, c));

// 再合并本地（按时间判断）
conversations.forEach(local => {
  const cloud = map.get(local.id);

  if (!cloud) {
    map.set(local.id, local);
  } else {
    const localTime = local.updatedAt || 0;
    const cloudTime = cloud.updatedAt || 0;

    if (localTime >= cloudTime) {
      map.set(local.id, local);
    }
  }
});

// 按更新时间排序（最新在前）
conversations = Array.from(map.values()).sort(
  (a, b) => (b.updatedAt || 0) - (a.updatedAt || 0)
);

      localStorage.setItem("conversations", JSON.stringify(conversations));
      renderChatList();
      if (conversations.length) loadChat(conversations[0].id);
    }
  } catch (e) {
    console.warn("云端拉取失败:", e);
  }
}

async function syncToCloud() {
  if (!session || !session.user) return;

  try {
    if (!conversations) return;

    await supabase
      .from("conversations")
      .upsert({
        user_id: session.user.id,

function renderChatList() {
  const list = document.getElementById("chatList");
  if (!list) return;

  list.innerHTML = "";

  conversations.forEach(c => {

    // 关键：点击时确保关闭遮罩

      loadChat(c.id);
    };

function loadChat(id) {

  if (!c) return;

  currentId = id;
  history = JSON.parse(JSON.stringify(c.history));
  chat.innerHTML = "";

  history.slice(1).forEach(m => {
    addMessage(m.content, m.role === "user" ? "user" : "ai");
  });

}

function addMessage(text, type) {

// AI标题生成助手
async function generateTitleFromAI(userMsg, aiMsg) {
  try {
    const prompt = `请根据下面的对话生成一个简短标题（不超过12个字，不要标点结尾）：\n用户：${userMsg}\n助手：${aiMsg}`;

    const res = await fetch("https://ai.liuxizekali.workers.dev", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        messages: [
          { role: "system", content: "你是一个标题生成器，只返回标题本身。" },
          { role: "user", content: prompt }
        ]
      })
    });

    if (!res.ok || !res.body) return null;

    const reader = res.body.getReader();
    const decoder = new TextDecoder("utf-8");
    let full = "";

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      const chunk = decoder.decode(value, { stream: true });
      const lines = chunk.split("\n");
      for (const line of lines) {
        if (!line.startsWith("data:")) continue;
        const dataStr = line.replace("data:", "").trim();
        if (!dataStr || dataStr === "[DONE]") continue;
        try {
          const json = JSON.parse(dataStr);
          const content = json.choices?.[0]?.delta?.content;
          if (content) full += content;
        } catch {}
      }
    }

    let title = full.trim().replace(/\n/g, " ");
    if (title.length > 12) title = title.slice(0, 12) + "…";
    return title || null;
  } catch {
    return null;
  }
}

c.updatedAt = Date.now();

conversations.sort((a, b) => (b.updatedAt || 0) - (a.updatedAt || 0));
      // ⭐ AI生成标题（仅第一次AI回复时）

c._autoTitle = false; // ⭐标记自动标题

      }
    }

    if (history.length > 20) {

}

    document.querySelectorAll("pre code").forEach(el => hljs.highlightElement(el));

  } catch (err) {

  if (fullText) {

input.readOnly = false;

    </div>
  `;

  // 退出

  };

  // 点击外部关闭
  setTimeout(() => {
    document.addEventListener("click", closeMenu);
  }, 0);

      menu.remove();
      document.removeEventListener("click", closeMenu);
    }
  }
