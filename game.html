<!DOCTYPE html>

<html lang="zh-Hans">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>小游戏</title>

<link rel="preload" as="image" href="p/chengshi.webp" type="image/webp">
<link rel="preload" as="image" href="p/chengshi.png">
<link rel="preload" as="image" href="p/bird.png">

<link rel="stylesheet" href="p/css/tokens.css">
<link rel="stylesheet" href="p/css/base.css">
<style>
/* ================= 游戏页面样式（依赖 tokens.css / base.css） ================= */
body.preload { opacity: 0; }

body {
  min-height: 100vh;
  min-height: 100svh;
  display: flex;
  justify-content: center;
  align-items: flex-start;
  user-select: none;
  -webkit-tap-highlight-color: transparent;
  /* 画布透明，城市背景即游戏场景 */
  background: var(--bg) url('p/chengshi.png') center / cover no-repeat fixed;
  transition: opacity var(--dur-slow) ease;
}

@supports (background-image: url("p/chengshi.webp")) {
  body {
    background-image: url('p/chengshi.webp');
  }
}

body.night {
  background-image: none;
}

/* ================= 游戏容器 ================= */
#gameWrapper {
  position: relative;
  margin: 2vh auto;
  display: flex;
  justify-content: center;
  animation: fade-in-up var(--dur-slow) var(--ease) both;
}

canvas {
  border-radius: var(--r-lg);
  box-shadow: var(--shadow-lg);
  touch-action: none;
}

/* ================= 游戏结束遮罩 ================= */
.overlay {
  position: absolute;
  inset: 0;
  display: none;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  gap: var(--space-4);
  background: var(--glass-bg);
  -webkit-backdrop-filter: blur(12px);
  backdrop-filter: blur(12px);
  border-radius: var(--r-lg);
}

/* 兼容性兜底 */
@supports not ((backdrop-filter: blur(10px)) or (-webkit-backdrop-filter: blur(10px))) {
  .overlay { background: var(--surface); }
}

.overlay h1 {
  color: var(--text);
  font-size: var(--title-lg);
  font-weight: 700;
  letter-spacing: -0.01em;
  animation: modal-pop var(--dur-base) var(--ease);
}

@keyframes modal-pop {
  from { opacity: 0; transform: scale(0.96); }
  to   { opacity: 1; transform: scale(1); }
}

/* ================= 重开按钮 ================= */
.overlay button {
  height: 44px;
  padding: 0 var(--space-8);
  font-family: inherit;
  font-size: var(--text-base);
  font-weight: 600;
  border-radius: var(--r-md);
  border: none;
  background: var(--brand);
  color: var(--on-brand);
  cursor: pointer;
  transition: transform var(--dur-fast) var(--ease),
              box-shadow var(--dur-fast) var(--ease),
              background var(--dur-fast) var(--ease);
}

.overlay button:hover {
  background: var(--brand-strong);
  transform: translateY(-1px);
  box-shadow: var(--shadow-md);
}

.overlay button:active { transform: none; }

/* ================= 加载指示 ================= */
#loading {
  position: fixed;
  inset: 0;
  z-index: 9998;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: var(--space-4);
  background: var(--bg);
  transition: opacity var(--dur-slow) ease;
}

#loading p {
  margin: 0;
  color: var(--text-2);
  font-size: var(--text-sm);
}

/* ================= 横屏适配 ================= */
@media (orientation: landscape) and (max-width: 900px) {
  #gameWrapper { align-items: center; }

  .overlay {
    flex-direction: row;
    justify-content: center;
    gap: var(--space-6);
  }

  .overlay h1 { font-size: var(--title-md); }
}

/* ================= iOS 安全区 ================= */
@supports (padding: env(safe-area-inset-bottom)) {
  body { padding-bottom: env(safe-area-inset-bottom); }
  .overlay { padding-bottom: env(safe-area-inset-bottom); }
}

/* ================= 移动端适配 ================= */
@media (max-width: 480px) {
  .overlay h1 { font-size: var(--title-md); }
}
</style>

</head>

<body class="preload">
<!-- 加载动画（主页同款）-->
<div id="loading" aria-label="加载中">
  <div class="spinner" aria-hidden="true"></div>
  <p id="loadingText">加载中...</p>
</div>

<div id="gameWrapper">
  <canvas id="game" role="img" aria-label="游戏画面"></canvas>

  <div class="overlay" id="overlay" role="dialog" aria-labelledby="overText">
    <h1 id="overText">游戏结束</h1>
    <button id="restart" autofocus>再来一局</button>
  </div>
</div>

<script>
/* ================= 自动主题切换（主页同款）================= */
function applyAutoTheme() {
  const hour = new Date().getHours();
  const isNight = hour >= 18 || hour < 6; // 18:00–06:00
  document.body.classList.toggle('night', isNight);
}

// 初始化主题
applyAutoTheme();
// 每10分钟检查一次主题
setInterval(applyAutoTheme, 10 * 60 * 1000);

/* ================= 国际化 ================= */
const i18n = {
  zh: {
    title: "小游戏",
    gameOver: "游戏结束",
    restart: "再来一局",
    loading: "加载中...",
    tapToStart: "点击屏幕开始",
    highScore: "最高"
  },
  en: {
    title: "Mini Game",
    gameOver: "Game Over",
    restart: "Play Again",
    loading: "Loading...",
    tapToStart: "Tap to Start",
    highScore: "Best"
  },
  ja: {
    title: "ミニゲーム",
    gameOver: "ゲームオーバー",
    restart: "もう一度",
    loading: "読み込み中...",
    tapToStart: "タップして開始",
    highScore: "最高"
  }
};

function detectLang(){
  const saved = localStorage.getItem("lang");
  if (saved && i18n[saved]) return saved;

  const nav = navigator.language || "zh";
  if (nav.startsWith("ja")) return "ja";
  if (nav.startsWith("en")) return "en";
  return "zh";
}

const LANG = detectLang();
const T = i18n[LANG] || i18n.zh;

/* ================= 游戏配置 ================= */
const CONFIG = {
  LOGIC_W: 400,
  LOGIC_H: 650,
  GRAVITY: 0.30,
  JUMP_FORCE: -5.2,
  PIPE_GAP: 170,
  PIPE_WIDTH: 65,
  PIPE_SPACING: 240,
  PIPE_SPEED: 2.8,
  MAX_FALL_SPEED: 12,
  BIRD_SIZE: 34,
  BIRD_START_X: 60,
  BIRD_START_Y: 300,
  COLLISION_PADDING: 4,
  GROUND_OFFSET: 10,
  MAX_SCALE: 2.0
};

/* ================= DOM 元素 ================= */
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");
const overlay = document.getElementById("overlay");
const restartBtn = document.getElementById("restart");
const loadingEl = document.getElementById("loading");

/* ================= 自适应缩放 ================= */
let gameState = 'loading'; // 提前声明，防止 TDZ
let scale = 1;

function resize(){
  const dpr = window.devicePixelRatio || 1;

  const availableW = window.innerWidth;
  const availableH = window.innerHeight * 0.95;

  let widthBased = availableW / CONFIG.LOGIC_W;
  let heightBased = availableH / CONFIG.LOGIC_H;

  // 判断是否为移动端（触控为主 or 窄屏）
  const isMobile =
    window.matchMedia("(pointer: coarse)").matches ||
    Math.min(availableW, availableH) < 700;

  // 📱 手机：cover（铺满）
  // 💻 电脑：contain（完整显示）
  if (isMobile) {
    scale = Math.max(widthBased, heightBased);
  } else {
    scale = Math.min(widthBased, heightBased);
  }

  scale = Math.min(scale, CONFIG.MAX_SCALE);

  // CSS 显示尺寸
  canvas.style.width = CONFIG.LOGIC_W * scale + "px";
  canvas.style.height = CONFIG.LOGIC_H * scale + "px";

  // 实际像素尺寸（高清）
  canvas.width = Math.round(CONFIG.LOGIC_W * scale * dpr);
  canvas.height = Math.round(CONFIG.LOGIC_H * scale * dpr);

  // 如果游戏已开始，重绘当前帧
  if(typeof gameState !== 'undefined' && gameState !== 'loading') {
    draw();
  }
}

window.addEventListener("resize", resize);
resize();

/* ================= 资源加载 ================= */
const birdImg = new Image();
let assetsLoaded = false;

function loadAssets(){
  return new Promise((resolve) => {
    let resolved = false;
    
    const finishLoading = () => {
      if(!resolved){
        resolved = true;
        resolve();
      }
    };
    
    birdImg.onload = () => {
      console.log('Bird image loaded successfully');
      assetsLoaded = true;
      finishLoading();
    };
    
    birdImg.onerror = (e) => {
      console.warn('Bird image failed to load, using fallback style');
      assetsLoaded = false;
      finishLoading();
    };
    
    // 超时降级（1.5秒）
    setTimeout(() => {
      if(!resolved){
        console.warn('Image loading timeout, starting game anyway');
        assetsLoaded = false;
        finishLoading();
      }
    }, 1500);
    
    // 开始加载
    birdImg.src = "p/bird.png";
  });
}

/* ================= 游戏状态 ================= */
// let gameState = 'loading'; // loading, ready, playing, gameOver  // 已提前声明于前面
let player, pipes, score, highScore, rafId;

highScore = Number(localStorage.getItem("highScore")) || 0;

/* ================= 初始化游戏 ================= */
function resetGame(){
  player = {
    x: CONFIG.BIRD_START_X,
    y: CONFIG.BIRD_START_Y,
    size: CONFIG.BIRD_SIZE,
    dy: 0,
    angle: 0
  };
  
  pipes = [];
  score = 0;
  gameState = 'ready';
  overlay.style.display = "none";

  // 初始化管道
  for(let i = 0; i < 2; i++){
    createPipe(CONFIG.LOGIC_W + 100 + i * CONFIG.PIPE_SPACING);
  }

  cancelAnimationFrame(rafId);
  rafId = requestAnimationFrame(loop);
}

/* ================= 管道生成 ================= */
function createPipe(x){
  const min = 50;
  const max = CONFIG.LOGIC_H - CONFIG.PIPE_GAP - 120;
  const top = Math.random() * (max - min) + min;

  pipes.push({ x, top, passed: false });
}

/* ================= 碰撞检测 ================= */
function hit(a, b){
  const pad = CONFIG.COLLISION_PADDING;
  return !(
    a.x + a.w - pad < b.x ||
    a.x + pad > b.x + b.w ||
    a.y + a.h - pad < b.y ||
    a.y + pad > b.y + b.h
  );
}

/* ================= 游戏逻辑更新 ================= */
function update(){
  if(gameState !== 'playing') return;

  // 重力和速度限制
  player.dy += CONFIG.GRAVITY;
  if(player.dy > CONFIG.MAX_FALL_SPEED) player.dy = CONFIG.MAX_FALL_SPEED;
  player.y += player.dy;

  // 生成新管道
  if(pipes[pipes.length - 1].x < CONFIG.LOGIC_W - CONFIG.PIPE_SPACING){
    createPipe(CONFIG.LOGIC_W + 50);
  }

  // 移动管道
  pipes.forEach(p => p.x -= CONFIG.PIPE_SPEED);
  pipes = pipes.filter(p => p.x + CONFIG.PIPE_WIDTH > -100);

  // 碰撞检测
  const birdBox = {
    x: player.x,
    y: player.y,
    w: player.size,
    h: player.size
  };

  for(const p of pipes){
    const topBox = {
      x: p.x,
      y: 0,
      w: CONFIG.PIPE_WIDTH,
      h: p.top
    };
    const botBox = {
      x: p.x,
      y: p.top + CONFIG.PIPE_GAP,
      w: CONFIG.PIPE_WIDTH,
      h: CONFIG.LOGIC_H - (p.top + CONFIG.PIPE_GAP)
    };

    if(hit(birdBox, topBox) || hit(birdBox, botBox)){
      endGame();
      return;
    }

    // 计分（仅在游戏进行中）
    if(
      gameState === 'playing' &&
      !p.passed &&
      player.x + player.size / 2 > p.x + CONFIG.PIPE_WIDTH / 2
    ){
      score++;
      p.passed = true;
    }
  }

  // 边界检测
  if(player.y + player.size > CONFIG.LOGIC_H - CONFIG.GROUND_OFFSET || player.y < -player.size){
    endGame();
    return;
  }

  // 角度计算
  player.angle = Math.max(-0.35, Math.min(Math.PI / 2, player.dy * 0.12));
}

/* ================= 绘制画面 ================= */
function draw(){
  const dpr = window.devicePixelRatio || 1;
  ctx.setTransform(scale * dpr, 0, 0, scale * dpr, 0, 0);
  ctx.clearRect(0, 0, CONFIG.LOGIC_W, CONFIG.LOGIC_H);

  // 绘制管道
  ctx.fillStyle = "#5cb85c";
  pipes.forEach(p => {
    ctx.fillRect(p.x, 0, CONFIG.PIPE_WIDTH, p.top);
    ctx.fillRect(
      p.x,
      p.top + CONFIG.PIPE_GAP,
      CONFIG.PIPE_WIDTH,
      CONFIG.LOGIC_H - (p.top + CONFIG.PIPE_GAP)
    );
  });

  // 绘制小鸟
  ctx.save();
  ctx.translate(player.x + player.size / 2, player.y + player.size / 2);
  ctx.rotate(player.angle);

  if(assetsLoaded && birdImg.complete){
    ctx.drawImage(birdImg, -player.size / 2, -player.size / 2, player.size, player.size);
  } else {
    // 降级样式
    ctx.fillStyle = "#ffcc00";
    ctx.fillRect(-player.size / 2, -player.size / 2, player.size, player.size);
  }
  ctx.restore();

  // 绘制分数
  ctx.fillStyle = "#fff";
  ctx.font = "900 42px sans-serif";
  ctx.textAlign = "center";
  ctx.textBaseline = "top";
  ctx.fillText(score, CONFIG.LOGIC_W / 2, 60);

  // 绘制最高分
  ctx.font = "600 20px sans-serif";
  ctx.fillText(`${T.highScore}: ${highScore}`, CONFIG.LOGIC_W / 2, 110);

  // 绘制开始提示
  if(gameState === 'ready'){
    ctx.fillStyle = "rgba(0,0,0,0.5)";
    ctx.fillRect(0, CONFIG.LOGIC_H / 2 - 50, CONFIG.LOGIC_W, 100);
    
    ctx.fillStyle = "#fff";
    ctx.font = "bold 24px sans-serif";
    ctx.textAlign = "center";
    ctx.textBaseline = "middle";
    ctx.fillText(T.tapToStart, CONFIG.LOGIC_W / 2, CONFIG.LOGIC_H / 2);
  }
}

/* ================= 主循环 ================= */
function loop(){
  update();
  draw();
  if(gameState !== 'gameOver') {
    rafId = requestAnimationFrame(loop);
  }
}

/* ================= 游戏结束 ================= */
function endGame(){
  if(gameState === 'gameOver') return;
  gameState = 'gameOver';

  // 更新最高分
  if(score > highScore){
    highScore = score;
    localStorage.setItem("highScore", highScore);
  }

  overlay.style.display = "flex";
}

/* ================= 输入处理 ================= */
function jump(e){
  if(e && e.code === "Space") e.preventDefault();
  
  if(gameState === 'ready'){
    // 开始游戏
    gameState = 'playing';
  }
  
  if(gameState === 'playing'){
    player.dy = CONFIG.JUMP_FORCE;
  }
}

document.addEventListener("keydown", jump);
document.addEventListener("mousedown", jump);
document.addEventListener("touchstart", jump, { passive: false });

restartBtn.onclick = e => {
  e.stopPropagation();
  resetGame();
};

/* ================= iOS Safari 特殊适配 ================= */
if (/iPad|iPhone|iPod/.test(navigator.userAgent)) {
  document.body.addEventListener("touchmove", e => {
    if (e.target === canvas) e.preventDefault();
  }, { passive: false });

  // 强制重新计算尺寸（解决横竖屏切换高度不准）
  window.addEventListener("orientationchange", () => {
    setTimeout(resize, 300);
  });
}

/* ================= 启动游戏 ================= */
window.addEventListener('load', async function() {
  try {
    // 更新 UI 文本
    document.title = T.title;
    document.getElementById("overText").textContent = T.gameOver;
    document.getElementById("restart").textContent = T.restart;
    loadingEl.querySelector('p').textContent = T.loading;

    console.log('Starting to load assets...');
    
    // 加载资源
    await loadAssets();

    console.log('Assets loaded, starting game...');

    // 移除 preload 类，显示页面
    document.body.classList.remove('preload');
    document.body.style.opacity = '1';

    // 隐藏加载画面（主页同款动画）
    loadingEl.style.opacity = '0';
    setTimeout(() => loadingEl.remove(), 400);

    // 启动游戏
    resetGame();
    
    console.log('Game initialized successfully');
  } catch(error) {
    console.error('Initialization error:', error);
    // 即使出错也隐藏加载画面并启动游戏
    document.body.classList.remove('preload');
    loadingEl.style.opacity = '0';
    setTimeout(() => loadingEl.remove(), 400);
    resetGame();
  }
});

function showGlobalLoading() {
  const el = document.getElementById("loadingBar");
  if (el) el.classList.add("active");
}

function hideGlobalLoading() {
  const el = document.getElementById("loadingBar");
  if (el) el.classList.remove("active");
}

// 页面进入立即关闭 loading（防止跨页面残留）
document.addEventListener("DOMContentLoaded", () => {
  hideGlobalLoading();
});

document.querySelectorAll("a").forEach(a => {
  a.addEventListener("click", () => {
    showGlobalLoading();
  });
});
</script>


<div id="loadingBar" aria-hidden="true"><span class="bar"></span></div>
</body>
</html>
