<!DOCTYPE html>
<html lang="zh-Hans">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>关注我们 - 霜蓝</title>
  <meta name="theme-color" content="#f7f9fa" media="(prefers-color-scheme: light)">
  <meta name="theme-color" content="#13151e" media="(prefers-color-scheme: dark)">
  <link rel="stylesheet" href="p/css/tokens.css">
  <link rel="stylesheet" href="p/css/base.css">
  <style>
    body.preload { opacity: 0; }

    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      overflow-x: hidden;
    }

    .page-card {
      width: min(100% - var(--space-8), 720px);
      margin-top: var(--space-16);
      padding: var(--space-8) var(--space-6) var(--space-12);
      text-align: center;
      animation: fade-in-up var(--dur-slow) var(--ease) both;
    }

    h1 {
      font-size: var(--title-md);
      font-weight: 700;
      letter-spacing: -0.01em;
      margin-bottom: var(--space-4);
    }

    p {
      margin: 0 auto;
      max-width: 56ch;
      font-size: var(--text-base);
      color: var(--text-2);
    }

    .logos {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(110px, 1fr));
      gap: var(--space-3);
      margin-top: var(--space-8);
    }

    .logo-item {
      padding: var(--space-4) var(--space-2);
      border: 1px solid var(--border);
      border-radius: var(--r-md);
      background: var(--surface-2);
      font-size: var(--text-sm);
      color: var(--text-2);
      transition: transform var(--dur-fast) var(--ease),
                  border-color var(--dur-fast) var(--ease),
                  box-shadow var(--dur-fast) var(--ease);
    }

    .logo-item:hover {
      transform: translateY(-2px);
      border-color: var(--brand);
      box-shadow: var(--shadow-sm);
    }

    /* 统一图标展示盒 */
    .logo-box {
      width: 56px;
      height: 56px;
      margin: 0 auto var(--space-2);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .logo-box img {
      max-width: 100%;
      max-height: 100%;
      object-fit: contain;
    }

    /* 横向图标视觉补偿 */
    .logo-wide img { transform: scale(1.15); }

    .back { margin-top: var(--space-8); }

    @media (max-width: 480px) {
      .page-card { margin-top: var(--space-12); }
      .logos { grid-template-columns: repeat(2, 1fr); }
    }

    #loading {
      position: fixed;
      inset: 0;
      z-index: 9998;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--bg);
      transition: opacity var(--dur-slow) ease;
    }

    body.fade-in { animation: fade-body var(--dur-slow) ease; }
    @keyframes fade-body { from { opacity: 0; } to { opacity: 1; } }
  </style>
</head>

<body>
  <script>
    /* 首帧前应用夜间主题，避免闪色 */
    (function () {
      var hour = new Date().getHours();
      if (hour >= 18 || hour < 6) document.body.classList.add('night');
    })();
  </script>

  <div id="loading" aria-label="页面加载中"><div class="spinner" aria-hidden="true"></div></div>

  <main class="page-shell page-card card">
    <h1 id="titleText"></h1>
    <p id="descText"></p>

    <div class="logos">

      <div class="logo-item">
        <div class="logo-box"><img src="p/bilibili.svg" alt="B站"></div>
        <div>B站</div>
      </div>

      <div class="logo-item">
        <div class="logo-box"><img src="p/dy.svg" alt="抖音"></div>
        <div>抖音</div>
      </div>

      <div class="logo-item">
        <div class="logo-box"><img src="p/github.svg" alt="GitHub"></div>
        <div>GitHub</div>
      </div>

      <div class="logo-item">
        <div class="logo-box"><img src="p/ks.png" alt="快手"></div>
        <div>快手</div>
      </div>

      <div class="logo-item">
        <div class="logo-box"><img src="p/x.svg" alt="x"></div>
        <div>X</div>
      </div>

      <div class="logo-item">
        <div class="logo-box"><img src="p/xhs.svg" alt="小红书"></div>
        <div>小红书</div>
      </div>

      <div class="logo-item">
        <div class="logo-box logo-wide"><img src="p/ithome.png" alt="IT之家"></div>
        <div>IT之家</div>
      </div>

      <div class="logo-item">
        <div class="logo-box logo-wide"><img src="p/youtube.png" alt="YouTube"></div>
        <div>YouTube</div>
      </div>

    </div>

    <a href="index.html" class="back btn btn-secondary" id="backBtn"></a>
  </main>

  <footer class="site-footer">© 2024–2026 霜蓝 · All Rights Reserved.</footer>

  <script>
    document.body.classList.add('preload');

    function applyAutoTheme() {
      const hour = new Date().getHours();
      document.body.classList.toggle('night', hour >= 18 || hour < 6);
    }

    applyAutoTheme();
    setInterval(applyAutoTheme, 600000);

    const i18n = {
      zh: {
        title: "关注我们",
        desc: "全网搜索霜蓝，获取更多动态：",
        back: "← 返回主页",
        platforms: ["B站","抖音","GitHub","快手","X","小红书","IT之家","YouTube"]
      }
    };

    function applyLang() {
      const t = i18n.zh;
      document.getElementById("titleText").textContent = t.title;
      document.getElementById("descText").textContent = t.desc;
      document.getElementById("backBtn").textContent = t.back;
    }

    window.addEventListener('load', () => {
      applyLang();
      document.body.classList.remove('preload');
      document.body.classList.add('fade-in');
      const loader = document.getElementById('loading');
      loader.style.opacity = '0';
      setTimeout(() => loader.remove(), 400);
    });

    document.addEventListener("DOMContentLoaded", () => {
      const links = document.querySelectorAll("a[href]");
      links.forEach(link => {
        const href = link.getAttribute("href");
        if (!href.startsWith("#")) {
          link.addEventListener("click", (e) => {
            e.preventDefault();
            document.body.classList.add("fade-out");
            setTimeout(() => window.location.href = href, 250);
          });
        }
      });
    });

    function showGlobalLoading() {
      const el = document.getElementById("loadingBar");
      if (el) el.classList.add("active");
    }
    function hideGlobalLoading() {
      const el = document.getElementById("loadingBar");
      if (el) el.classList.remove("active");
    }

    // 页面进入立即关闭 loading（防止跨页面残留）
    document.addEventListener("DOMContentLoaded", () => {
      hideGlobalLoading();
    });

    document.querySelectorAll("a").forEach(a => {
      a.addEventListener("click", () => {
        showGlobalLoading();
      });
    });
  </script>

  <div id="loadingBar" aria-hidden="true"><span class="bar"></span></div>
</body>
</html>
